/* ── TIMEFRAME RESAMPLING (D / W / M) ── */
function resampleToTF(tf){
  // tf: 'W' or 'M' — mutates S.times, S.closes, S.ohlc from S.raw
  const {times,closes,ohlc}=S.raw;
  function weekKey(ds){
    const d=new Date(ds+'T00:00:00Z'),day=d.getUTCDay(),diff=day===0?-6:1-day;
    d.setUTCDate(d.getUTCDate()+diff);return d.toISOString().slice(0,10);
  }
  function monthKey(ds){return ds.slice(0,7)+'-01';}
  const getKey=tf==='W'?weekKey:monthKey;
  const groups=new Map();
  for(let i=0;i<times.length;i++){
    const k=getKey(times[i]);
    if(!groups.has(k)){
      const o=ohlc?ohlc[i].open:closes[i];
      const h=ohlc?ohlc[i].high:closes[i];
      const l=ohlc?ohlc[i].low:closes[i];
      groups.set(k,{time:times[i],open:o,high:h,low:l,close:closes[i],closeVal:closes[i]});
    }else{
      const g=groups.get(k);
      const h=ohlc?ohlc[i].high:closes[i],l=ohlc?ohlc[i].low:closes[i];
      if(h>g.high)g.high=h;if(l<g.low)g.low=l;
      g.close=ohlc?ohlc[i].close:closes[i];g.closeVal=closes[i];
    }
  }
  S.times=[];S.closes=[];S.ohlc=ohlc?[]:null;
  for(const g of groups.values()){
    S.times.push(g.time);S.closes.push(g.closeVal);
    if(S.ohlc)S.ohlc.push({time:g.time,open:g.open,high:g.high,low:g.low,close:g.close});
  }
  S.timeIdx={};S.times.forEach((t,i)=>S.timeIdx[t]=i);
}
function setTimeframe(tf){
  if(!S.raw)return;
  S.tf=tf;
  ['D','W','M'].forEach(t=>document.getElementById('tf'+t).classList.toggle('on',t===tf));
  S.times=[...S.raw.times];S.closes=[...S.raw.closes];S.ohlc=S.raw.ohlc?[...S.raw.ohlc]:null;
  if(tf!=='D')resampleToTF(tf);
  S.timeIdx={};S.times.forEach((t,i)=>S.timeIdx[t]=i);
  document.getElementById('btnCandle').style.opacity=S.ohlc?1:.4;
  document.getElementById('btnCandle').style.pointerEvents=S.ohlc?'auto':'none';
  if(!S.ohlc&&S.chartType==='candle'){S.chartType='area';document.getElementById('btnArea').classList.add('on');document.getElementById('btnCandle').classList.remove('on');}
  document.getElementById('srcChip').textContent=S.title+' · '+S.times.length+' bars';
  if(S.chart)buildChart();computeStats();
}

/* ── INDICATORS ── */
function SMA(v,p){const o=Array(v.length).fill(null);let s=0;for(let i=0;i<v.length;i++){s+=v[i];if(i>=p)s-=v[i-p];if(i>=p-1)o[i]=s/p;}return o;}
function EMA(v,p){const o=Array(v.length).fill(null);const k=2/(p+1);let pr=null;for(let i=0;i<v.length;i++){if(i<p-1)continue;if(pr===null){let s=0;for(let j=i-p+1;j<=i;j++)s+=v[j];pr=s/p;o[i]=pr;}else{pr=v[i]*k+pr*(1-k);o[i]=pr;}}return o;}
function STD(v,p){const o=Array(v.length).fill(null);for(let i=p-1;i<v.length;i++){let m=0;for(let j=i-p+1;j<=i;j++)m+=v[j];m/=p;let s=0;for(let j=i-p+1;j<=i;j++){const d=v[j]-m;s+=d*d;}o[i]=Math.sqrt(s/p);}return o;}
function RSI(v,p){const o=Array(v.length).fill(null);if(v.length<=p)return o;let g=0,l=0;for(let i=1;i<=p;i++){const d=v[i]-v[i-1];d>=0?g+=d:l-=d;}let ag=g/p,al=l/p;o[p]=al===0?100:100-100/(1+ag/al);for(let i=p+1;i<v.length;i++){const d=v[i]-v[i-1];const gd=d>0?d:0,ld=d<0?-d:0;ag=(ag*(p-1)+gd)/p;al=(al*(p-1)+ld)/p;o[i]=al===0?100:100-100/(1+ag/al);}return o;}
function MACD(v,f,sl,sig){const ef=EMA(v,f),es=EMA(v,sl);const mc=v.map((_,i)=>(ef[i]!=null&&es[i]!=null)?ef[i]-es[i]:null);const idx=mc.map((x,i)=>x!=null?i:-1).filter(i=>i>=0);const sc=EMA(idx.map(i=>mc[i]),sig);const sg=Array(v.length).fill(null);idx.forEach((gi,k)=>{if(sc[k]!=null)sg[gi]=sc[k];});return{macd:mc,signal:sg,hist:v.map((_,i)=>(mc[i]!=null&&sg[i]!=null)?mc[i]-sg[i]:null)};}
function pack(arr){const o=[];for(let i=0;i<arr.length;i++){if(arr[i]!=null&&!isNaN(arr[i]))o.push({time:S.times[i],value:arr[i]});}return o;}
/* ════════ INDICATOR INSTANCE ENGINE (TradingView-style) ════════ */
// Each indicator the user adds is an *instance* with its own params + style.
const IND_DEFS={
  sma:{name:'Moving Average (SMA)',short:'SMA',cat:'Moving Averages',overlay:true,color:'#d97706',
       params:[{k:'length',label:'Length',def:20,min:1,max:400}],source:true},
  ema:{name:'Exp. Moving Average (EMA)',short:'EMA',cat:'Moving Averages',overlay:true,color:'#0891b2',
       params:[{k:'length',label:'Length',def:21,min:1,max:400}],source:true},
  bb:{name:'Bollinger Bands',short:'BB',cat:'Volatility',overlay:true,color:'#64748b',
      params:[{k:'length',label:'Length',def:20,min:2,max:400},{k:'mult',label:'StdDev',def:2,min:0.5,max:5,step:0.1}],source:true},
  vol:{name:'Volume',short:'VOL',cat:'Volume',overlay:true,color:'#2d7d52',params:[],needsVol:true},
  rsi:{name:'Relative Strength Index',short:'RSI',cat:'Oscillators',overlay:false,color:'#d97706',
       params:[{k:'length',label:'Length',def:14,min:2,max:200}]},
  macd:{name:'MACD',short:'MACD',cat:'Oscillators',overlay:false,color:'#2d7d52',
        params:[{k:'fast',label:'Fast',def:12,min:1,max:200},{k:'slow',label:'Slow',def:26,min:1,max:400},{k:'signal',label:'Signal',def:9,min:1,max:200}]},
  rsN50:{name:'Compare vs Nifty 50',short:'RS·N50',cat:'Comparison',overlay:false,color:'#7c3aed',sym:'^NSEI',params:[]},
  rsN500:{name:'Compare vs Nifty 500',short:'RS·N500',cat:'Comparison',overlay:false,color:'#0891b2',sym:'^CRSLDX',params:[]},
};
let _indSeq=1;
function srcArr(src){
  if(src==='open'&&S.ohlc)return S.ohlc.map(b=>b.open);
  if(src==='high'&&S.ohlc)return S.ohlc.map(b=>b.high);
  if(src==='low'&&S.ohlc)return S.ohlc.map(b=>b.low);
  return S.closes;
}
function lwStyle(s){return s==='dashed'?LWC.LineStyle.Dashed:s==='dotted'?LWC.LineStyle.Dotted:LWC.LineStyle.Solid;}
function applyAlpha(hex,a){
  if(a==null||a>=1)return hex;
  const h=hex.replace('#','');if(h.length<6)return hex;
  const r=parseInt(h.substr(0,2),16),g=parseInt(h.substr(2,2),16),b=parseInt(h.substr(4,2),16);
  return 'rgba('+r+','+g+','+b+','+a+')';
}
function pillLabel(inst){
  const d=IND_DEFS[inst.type];
  if(inst.type==='sma'||inst.type==='ema'||inst.type==='rsi')return d.short+' '+inst.params.length;
  if(inst.type==='bb')return 'BB '+inst.params.length;
  if(inst.type==='macd')return 'MACD '+inst.params.fast+','+inst.params.slow+','+inst.params.signal;
  return d.short;
}
async function fetchBenchmark(sym){
  if(S.rs.data[sym])return true;
  document.getElementById('fetchStatus').textContent='Fetching benchmark data…';
  try{
    const start=S.times[0],end=S.times[S.times.length-1];
    const r=await fetch('/api/index-tools/history?symbol='+encodeURIComponent(sym)+'&start='+start+'&end='+end);
    if(!r.ok)throw new Error('HTTP '+r.status);
    const j=await r.json();const map={};
    for(let i=0;i<(j.dates||[]).length;i++){if(j.close[i]!=null)map[j.dates[i]]=j.close[i];}
    if(!Object.keys(map).length)throw new Error('no data');
    S.rs.data[sym]=map;document.getElementById('fetchStatus').textContent='';return true;
  }catch(e){showMsg('Could not fetch benchmark: '+e.message,'err');document.getElementById('fetchStatus').textContent='';return false;}
}
async function addIndicator(type){
  const d=IND_DEFS[type];if(!d)return;
  if(!S.times.length){showMsg('Build an index first, then add indicators.','err');return;}
  if(d.needsVol&&!S.vol){showMsg('Volume data isn’t available for this index.','err');return;}
  if(d.sym){const ok=await fetchBenchmark(d.sym);if(!ok)return;}
  const params={};d.params.forEach(p=>params[p.k]=p.def);
  const inst={id:_indSeq++,type,params,source:'close',
    style:{color:d.color,lineWidth:2,opacity:1,lineStyle:'solid'},_series:[]};
  S.indicators.push(inst);
  if(S.chart)renderIndicators();
}
function removeIndicator(id){
  const i=S.indicators.findIndex(x=>x.id===id);if(i<0)return;
  (S.indicators[i]._series||[]).forEach(s=>{try{S.chart.removeSeries(s);}catch(e){}});
  S.indicators.splice(i,1);
  if(document.getElementById('indSet').dataset.id==String(id))closeIndSettings();
  if(S.chart)renderIndicators();else renderPills();
}
function updateIndicator(id,patchParams,patchStyle,patchSource){
  const inst=S.indicators.find(x=>x.id===id);if(!inst)return;
  if(patchParams)Object.assign(inst.params,patchParams);
  if(patchStyle)Object.assign(inst.style,patchStyle);
  if(patchSource!=null)inst.source=patchSource;
  if(S.chart)renderIndicators();
}
function renderIndicators(){
  if(!S.chart||!S.main){renderPills();return;}
  // tear down existing series
  S.indicators.forEach(inst=>{(inst._series||[]).forEach(s=>{try{S.chart.removeSeries(s);}catch(e){}});inst._series=[];});
  S.indCache={};
  const v=S.closes;
  let pane=1;
  S.indicators.forEach(inst=>{
    const d=IND_DEFS[inst.type],st=inst.style;
    const col=applyAlpha(st.color,st.opacity);
    const baseLine={color:col,lineWidth:st.lineWidth,lineStyle:lwStyle(st.lineStyle),priceLineVisible:false,lastValueVisible:false,crosshairMarkerVisible:false};
    if(inst.type==='sma'||inst.type==='ema'){
      const arr=(inst.type==='sma'?SMA:EMA)(srcArr(inst.source),inst.params.length);
      const s=S.chart.addSeries(LWC.LineSeries,baseLine,0);s.setData(pack(arr));inst._series=[s];
      S.indCache[inst.id]={arr};
    }else if(inst.type==='bb'){
      const src=srcArr(inst.source),p=inst.params.length,mult=inst.params.mult;
      const mid=SMA(src,p),sd=STD(src,p);
      const up=src.map((_,i)=>mid[i]!=null?mid[i]+mult*sd[i]:null),lo=src.map((_,i)=>mid[i]!=null?mid[i]-mult*sd[i]:null);
      const band={color:col,lineWidth:1,lineStyle:LWC.LineStyle.Dotted,priceLineVisible:false,lastValueVisible:false,crosshairMarkerVisible:false};
      const su=S.chart.addSeries(LWC.LineSeries,band,0);su.setData(pack(up));
      const sl=S.chart.addSeries(LWC.LineSeries,band,0);sl.setData(pack(lo));
      const sm=S.chart.addSeries(LWC.LineSeries,baseLine,0);sm.setData(pack(mid));
      inst._series=[su,sl,sm];S.indCache[inst.id]={up,mid,lo};
    }else if(inst.type==='vol'){
      if(!S.vol)return;
      const s=S.chart.addSeries(LWC.HistogramSeries,{priceScaleId:'vol',priceFormat:{type:'volume'},color:col},0);
      s.priceScale().applyOptions({scaleMargins:{top:0.82,bottom:0}});s.setData(S.vol);inst._series=[s];
      const vm={};S.vol.forEach(x=>vm[x.time]=x.value);S.indCache[inst.id]={arr:S.times.map(t=>vm[t]??null)};
    }else if(inst.type==='rsi'){
      const arr=RSI(v,inst.params.length);
      const s=S.chart.addSeries(LWC.LineSeries,{color:col,lineWidth:st.lineWidth,lineStyle:lwStyle(st.lineStyle),priceLineVisible:false,lastValueVisible:true},pane);
      s.setData(pack(arr));
      try{s.createPriceLine({price:70,color:'#dc2626',lineWidth:1,lineStyle:LWC.LineStyle.Dashed,axisLabelVisible:true,title:'70'});s.createPriceLine({price:30,color:'#16a34a',lineWidth:1,lineStyle:LWC.LineStyle.Dashed,axisLabelVisible:true,title:'30'});}catch(e){}
      inst._series=[s];inst._pane=pane;pane++;S.indCache[inst.id]={arr};
    }else if(inst.type==='macd'){
      const m=MACD(v,inst.params.fast,inst.params.slow,inst.params.signal);
      const sh=S.chart.addSeries(LWC.HistogramSeries,{priceLineVisible:false,lastValueVisible:false},pane);
      const hd=[];for(let i=0;i<v.length;i++){if(m.hist[i]!=null)hd.push({time:S.times[i],value:m.hist[i],color:m.hist[i]>=0?'rgba(22,163,74,.6)':'rgba(220,38,38,.6)'});}
      sh.setData(hd);
      const sl=S.chart.addSeries(LWC.LineSeries,{color:col,lineWidth:st.lineWidth,priceLineVisible:false,lastValueVisible:false},pane);sl.setData(pack(m.macd));
      const ss=S.chart.addSeries(LWC.LineSeries,{color:'#d97706',lineWidth:1,priceLineVisible:false,lastValueVisible:false},pane);ss.setData(pack(m.signal));
      inst._series=[sh,sl,ss];inst._pane=pane;pane++;S.indCache[inst.id]={macd:m.macd,signal:m.signal,hist:m.hist};
    }else if(inst.type==='rsN50'||inst.type==='rsN500'){
      const bmap=S.rs.data[d.sym];if(!bmap)return;
      const bvals=[];let lastB=null;S.times.forEach(t=>{if(bmap[t]!=null)lastB=bmap[t];bvals.push(lastB);});
      let si2=-1,b0=null,c0=null;for(let i=0;i<S.times.length;i++){if(bvals[i]!=null&&S.closes[i]!=null){si2=i;b0=bvals[i];c0=S.closes[i];break;}}
      if(si2<0)return;
      const rsData=[],arr=S.times.map(()=>null);
      for(let i=si2;i<S.times.length;i++){if(bvals[i]!=null&&S.closes[i]!=null){const val=(S.closes[i]/c0)/(bvals[i]/b0)*100;rsData.push({time:S.times[i],value:val});arr[i]=val;}}
      const s=S.chart.addSeries(LWC.LineSeries,{color:col,lineWidth:st.lineWidth,lineStyle:lwStyle(st.lineStyle),priceLineVisible:false,lastValueVisible:true},pane);
      s.setData(rsData);
      try{s.createPriceLine({price:100,color:'#9ca3af',lineWidth:1,lineStyle:LWC.LineStyle.Dashed,axisLabelVisible:true,title:'100'});}catch(e){}
      inst._series=[s];inst._pane=pane;pane++;S.indCache[inst.id]={arr};
    }
  });
  try{const ps=S.chart.panes();if(ps.length>1){const h=document.getElementById('chartWrap').clientHeight;const sub=Math.max(90,Math.min(150,Math.floor(h*.22)));for(let i=1;i<ps.length;i++)ps[i].setHeight(sub);}}catch(e){}
  renderPills();
  redrawOverlay();
}
// legacy callers (buildChart/setTimeframe/setChartType) still call refreshIndicators
function refreshIndicators(){renderIndicators();}

/* ── ACTIVE INDICATOR PILLS ── */
function renderPills(){
  const bar=document.getElementById('indPills');if(!bar)return;
  if(!S.indicators.length){bar.innerHTML='';bar.classList.remove('has');return;}
  bar.classList.add('has');
  let html='<span class="pl-lbl">Indicators</span>';
  S.indicators.forEach(inst=>{
    html+='<span class="ipill" data-id="'+inst.id+'"><span class="ipill-dot" style="background:'+inst.style.color+'"></span>'+
      '<span class="ipill-name">'+pillLabel(inst)+'</span>'+
      '<button class="ipill-btn" data-act="cfg" title="Settings">⚙</button>'+
      '<button class="ipill-btn" data-act="del" title="Remove">×</button></span>';
  });
  bar.innerHTML=html;
  bar.querySelectorAll('.ipill').forEach(p=>{
    const id=+p.dataset.id;
    p.querySelector('[data-act=cfg]').onclick=e=>{e.stopPropagation();openIndSettings(id,p);};
    p.querySelector('[data-act=del]').onclick=e=>{e.stopPropagation();removeIndicator(id);};
  });
}

/* ── LEGEND ── */
function fmt(n,d){if(n==null||isNaN(n))return'—';return Number(n).toLocaleString('en-IN',{minimumFractionDigits:d,maximumFractionDigits:d});}
function onCrosshair(param){
  const lg=document.getElementById('legend');
  // resolve the bar index being hovered (fall back to the last bar)
  let idx = (param.time && S.timeIdx && S.timeIdx[param.time]!=null) ? S.timeIdx[param.time] : S.times.length-1;
  const date=S.times[idx];
  const C=S.indCache||{};
  let main;
  if(S.ohlc){const b=S.ohlc[idx];main=`O ${fmt(b.open,2)}  H ${fmt(b.high,2)}  L ${fmt(b.low,2)}  C ${fmt(b.close,2)}`;}
  else main=`<b style="color:#111827">${fmt(S.closes[idx],2)}</b>`;
  let html=`<div class="ttl">${S.title}</div><div class="row"><span class="k">${date}</span> &nbsp; ${main}</div>`;
  const add=(lbl,x,col)=>{html+=`<div class="row"><span class="k" style="color:${col}">${lbl}</span> <b>${fmt(x,2)}</b></div>`;};
  S.indicators.forEach(inst=>{
    const c=C[inst.id];if(!c)return;const col=inst.style.color;
    if(inst.type==='bb'&&c.up){html+=`<div class="row"><span class="k" style="color:${col}">${pillLabel(inst)}</span> <b>${fmt(c.up[idx],2)} / ${fmt(c.mid[idx],2)} / ${fmt(c.lo[idx],2)}</b></div>`;}
    else if(inst.type==='macd'&&c.macd){html+=`<div class="row"><span class="k" style="color:${col}">MACD</span> <b>${fmt(c.macd[idx],2)}</b> <span class="k" style="color:#d97706">sig</span> ${fmt(c.signal[idx],2)} <span class="k">hist</span> ${fmt(c.hist[idx],2)}</div>`;}
    else if(c.arr)add(pillLabel(inst),c.arr[idx],col);
  });
  lg.innerHTML=html;
}

/* ── STATS ── */
function computeStats(){
  const v=S.closes,t=S.times,n=v.length;const first=v[0],last=v[n-1],tot=(last-first)/first;
  let hi=v[0],lo=v[0];for(let i=0;i<n;i++){if(v[i]>hi)hi=v[i];if(v[i]<lo)lo=v[i];}
  let peak=v[0],mdd=0;for(let i=0;i<n;i++){if(v[i]>peak)peak=v[i];const dd=(v[i]-peak)/peak;if(dd<mdd)mdd=dd;}
  const rets=[];for(let i=1;i<n;i++){if(v[i-1]>0)rets.push(Math.log(v[i]/v[i-1]));}
  const mn=rets.reduce((a,b)=>a+b,0)/(rets.length||1);let vr=0;rets.forEach(r=>vr+=(r-mn)*(r-mn));vr/=(rets.length||1);
  const vol=Math.sqrt(vr)*Math.sqrt(252);const yrs=(new Date(t[n-1])-new Date(t[0]))/86400000/365.25;
  const cagr=yrs>0?Math.pow(last/first,1/yrs)-1:null;
  const stats=[['Current',fmt(last,2),''],['Total Return',(tot>=0?'+':'')+fmt(tot*100,2)+'%',tot>=0?'pos':'neg'],
    cagr!=null?['CAGR',(cagr>=0?'+':'')+fmt(cagr*100,2)+'%',cagr>=0?'pos':'neg']:null,
    ['Ann. Vol',fmt(vol*100,2)+'%',''],['Max DD',fmt(mdd*100,2)+'%','neg'],
    ['ATH',fmt(hi,2),'pos'],['ATL',fmt(lo,2),'neg'],['Days',''+n,''],['Range',t[0]+' → '+t[n-1],'']].filter(Boolean);
  document.getElementById('stats').innerHTML=stats.map(s=>`<div class="stat"><div class="k">${s[0]}</div><div class="v ${s[2]}">${s[1]}</div></div>`).join('');
}

/* ── DRAWING ── */
const cv=document.getElementById('overlay');
function resizeOverlay(){
  const w=document.getElementById('chartWrap'),dpr=window.devicePixelRatio||1;
  cv.width=w.clientWidth*dpr;cv.height=w.clientHeight*dpr;
  cv.style.width=w.clientWidth+'px';cv.style.height=w.clientHeight+'px';
  cv.getContext('2d').setTransform(dpr,0,0,dpr,0,0);
}
window.addEventListener('resize',()=>{resizeOverlay();redrawOverlay();});
function px(pt){
  if(!S.chart||!S.main)return null;
  const x=S.chart.timeScale().logicalToCoordinate(pt.logical);
  const y=S.main.priceToCoordinate(pt.price);
  return(x==null||y==null)?null:{x,y};
}
function pricePaneH(){try{return S.chart.panes()[0].getHeight();}catch(e){return cv.clientHeight;}}
function redrawOverlay(){
  if(!S.chart||!S.main)return;
  const ctx=cv.getContext('2d');ctx.clearRect(0,0,cv.clientWidth,cv.clientHeight);
  const all=D.temp?[...D.shapes,D.temp]:D.shapes;
  all.forEach((sh,i)=>drawShape(ctx,sh,i===D.selected));
}
function drawShape(ctx,sh,sel){
  ctx.save();ctx.lineWidth=sel?2.5:1.5;
  if(sel){ctx.shadowColor='rgba(45,125,82,.35)';ctx.shadowBlur=8;}
  const col=sh.color||'#2d7d52';
  if(sh.type==='hline'){
    const y=S.main.priceToCoordinate(sh.a.price);if(y==null){ctx.restore();return;}
    ctx.strokeStyle=col;ctx.setLineDash([7,4]);ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(cv.clientWidth,y);ctx.stroke();ctx.setLineDash([]);
    lbl(ctx,cv.clientWidth-88,y,fmt(sh.a.price,2),col);
  }else if(sh.type==='trend'){
    const a=px(sh.a),b=sh.b&&px(sh.b);if(!a||!b){ctx.restore();return;}
    ctx.strokeStyle=col;ctx.beginPath();ctx.moveTo(a.x,a.y);ctx.lineTo(b.x,b.y);ctx.stroke();
    dot(ctx,a,col);dot(ctx,b,col);lbl(ctx,b.x+6,b.y,fmt(sh.b.price,2),col);
  }else if(sh.type==='rect'){
    const a=px(sh.a),b=sh.b&&px(sh.b);if(!a||!b){ctx.restore();return;}
    const x=Math.min(a.x,b.x),y=Math.min(a.y,b.y),w=Math.abs(b.x-a.x),h=Math.abs(b.y-a.y);
    ctx.fillStyle='rgba(45,125,82,.07)';ctx.fillRect(x,y,w,h);
    ctx.strokeStyle=col;ctx.setLineDash([4,3]);ctx.strokeRect(x,y,w,h);ctx.setLineDash([]);
    lbl(ctx,x+4,y-3,fmt(Math.max(sh.a.price,sh.b.price),2)+' / '+fmt(Math.min(sh.a.price,sh.b.price),2),'#374151');
  }else if(sh.type==='fib'){
    const a=px(sh.a),b=sh.b&&px(sh.b);if(!a||!b){ctx.restore();return;}
    const hi=Math.max(sh.a.price,sh.b.price),lo=Math.min(sh.a.price,sh.b.price);
    const x0=Math.min(a.x,b.x),x1=cv.clientWidth-60;
    const lvs=[[0,'#374151'],[.236,'#dc2626'],[.382,'#d97706'],[.5,'#2d7d52'],[.618,'#0891b2'],[.786,'#7c3aed'],[1,'#374151']];
    ctx.font='10px JetBrains Mono';
    lvs.forEach(([lv,c])=>{const p=hi-(hi-lo)*lv;const y=S.main.priceToCoordinate(p);if(y==null)return;ctx.strokeStyle=c;ctx.globalAlpha=.85;ctx.beginPath();ctx.moveTo(x0,y);ctx.lineTo(x1,y);ctx.stroke();ctx.globalAlpha=1;ctx.fillStyle=c;ctx.fillText((lv*100).toFixed(1)+'%  '+fmt(p,2),x0+4,y-3);});
    dot(ctx,a,col);dot(ctx,b,col);
  }else if(sh.type==='vline'){
    const x=S.chart.timeScale().logicalToCoordinate(sh.a.logical);if(x==null){ctx.restore();return;}
    ctx.strokeStyle=col;ctx.setLineDash([7,4]);ctx.beginPath();ctx.moveTo(x,0);ctx.lineTo(x,pricePaneH());ctx.stroke();ctx.setLineDash([]);
  }else if(sh.type==='text'){
    const a=px(sh.a);if(!a){ctx.restore();return;}
    ctx.font='600 13px Sora, sans-serif';const txt=sh.text||'Text';const w=ctx.measureText(txt).width+10;
    ctx.fillStyle='rgba(255,255,255,.92)';ctx.fillRect(a.x,a.y-11,w,20);
    ctx.fillStyle=col;ctx.fillText(txt,a.x+5,a.y+3);
    if(sel)dot(ctx,a,col);
  }else if(sh.type==='measure'){
    const a=px(sh.a),b=sh.b&&px(sh.b);if(!a||!b){ctx.restore();return;}
    const x=Math.min(a.x,b.x),y=Math.min(a.y,b.y),w=Math.abs(b.x-a.x),h=Math.abs(b.y-a.y);
    const up=sh.b.price>=sh.a.price;const fill=up?'rgba(22,163,74,.12)':'rgba(220,38,38,.12)';const line=up?'#16a34a':'#dc2626';
    ctx.fillStyle=fill;ctx.fillRect(x,y,w,h);ctx.strokeStyle=line;ctx.setLineDash([4,3]);ctx.strokeRect(x,y,w,h);ctx.setLineDash([]);
    const pct=sh.a.price?((sh.b.price-sh.a.price)/sh.a.price*100):0;
    const bars=Math.round(Math.abs(sh.b.logical-sh.a.logical));
    lbl(ctx,x+w/2-44,y-4,(pct>=0?'+':'')+fmt(pct,2)+'%  ·  '+bars+' bars',line);
  }
  ctx.restore();
}
function dot(ctx,p,col){ctx.fillStyle='#fff';ctx.strokeStyle=col;ctx.lineWidth=1.5;ctx.beginPath();ctx.arc(p.x,p.y,3.5,0,7);ctx.fill();ctx.stroke();}
function lbl(ctx,x,y,txt,col){ctx.font='10px JetBrains Mono';const w=ctx.measureText(txt).width+8;ctx.fillStyle='rgba(255,255,255,.93)';ctx.fillRect(x,y-9,w,14);ctx.fillStyle=col||'#111827';ctx.fillText(txt,x+4,y+1.5);}

/* ── HIT TESTING ── */
function dpt(a,b){return Math.hypot(a.x-b.x,a.y-b.y);}
function dseg(p,a,b){const dx=b.x-a.x,dy=b.y-a.y,l2=dx*dx+dy*dy;if(!l2)return dpt(p,a);const t=Math.max(0,Math.min(1,((p.x-a.x)*dx+(p.y-a.y)*dy)/l2));return dpt(p,{x:a.x+t*dx,y:a.y+t*dy});}
function hitTest(sh,x,y){
  if(!S.main)return false;
  if(sh.type==='hline'){const cy=S.main.priceToCoordinate(sh.a.price);return cy!=null&&Math.abs(y-cy)<9;}
  if(sh.type==='vline'){const cx=S.chart.timeScale().logicalToCoordinate(sh.a.logical);return cx!=null&&Math.abs(x-cx)<9;}
  const a=px(sh.a),b=sh.b?px(sh.b):null;if(!a)return false;
  if(sh.type==='text')return dpt({x,y},a)<16;
  if(sh.type==='trend')return b&&dseg({x,y},a,b)<9;
  if(sh.type==='rect'||sh.type==='measure')return b&&x>=Math.min(a.x,b.x)&&x<=Math.max(a.x,b.x)&&y>=Math.min(a.y,b.y)&&y<=Math.max(a.y,b.y);
  if(sh.type==='fib')return b&&(dpt({x,y},a)<14||dpt({x,y},b)<14);
  return false;
}

/* ── SHAPE MENU ── */
const COLS=['#2d7d52','#dc2626','#d97706','#0891b2','#7c3aed','#db2777','#374151','#ea580c'];
(function(){
  const sc=document.getElementById('smColors');
  COLS.forEach(c=>{
    const b=document.createElement('button');b.className='sm-col';b.style.background=c;b.title=c;
    b.onclick=()=>{if(D.selected>=0){D.shapes[D.selected].color=c;sc.querySelectorAll('.sm-col').forEach(x=>x.classList.toggle('picked',x===b));redrawOverlay();}};
    sc.appendChild(b);
  });
  document.getElementById('smDelete').onclick=()=>{if(D.selected>=0){D.shapes.splice(D.selected,1);D.selected=-1;hideMenu();redrawOverlay();}};
})();
function showMenu(idx,cx,cy){
  D.selected=idx;redrawOverlay();
  const m=document.getElementById('shapeMenu');m.style.display='block';
  // highlight current color
  const cur=D.shapes[idx]?.color;
  m.querySelectorAll('.sm-col').forEach(b=>b.classList.toggle('picked',b.style.background===cur||b.title===cur));
  m.style.left=Math.min(cx+6,window.innerWidth-210)+'px';
  m.style.top=Math.min(cy+6,window.innerHeight-120)+'px';
}
function hideMenu(){D.selected=-1;document.getElementById('shapeMenu').style.display='none';redrawOverlay();}
document.addEventListener('keydown',e=>{if(e.key==='Escape')hideMenu();});
document.addEventListener('mousedown',e=>{if(!document.getElementById('shapeMenu').contains(e.target)&&e.target.id!=='overlay')hideMenu();});

/* ── CHART WRAP CLICK (cursor mode hit test) ── */
// Show a grab/move cursor when hovering an editable shape (cursor mode only).
document.getElementById('chartWrap').addEventListener('mousemove',e=>{
  if(D.editing){document.getElementById('chartWrap').style.cursor='grabbing';return;}
  if(!isSelect()||!S.chart||!S.main){document.getElementById('chartWrap').style.cursor='';return;}
  const rect=document.getElementById('chartWrap').getBoundingClientRect();
  const h=hitHandle(e.clientX-rect.left,e.clientY-rect.top);
  document.getElementById('chartWrap').style.cursor=h?(h.which==='move'?'move':'grab'):'';
});
document.getElementById('chartWrap').addEventListener('click',e=>{
  if(!isSelect()||!S.chart||!S.main)return;
  if(D.justEdited){D.justEdited=false;return;} // a readjust drag just happened — don't open the menu
  const rect=document.getElementById('chartWrap').getBoundingClientRect();
  const x=e.clientX-rect.left,y=e.clientY-rect.top;
  const idx=D.shapes.findIndex(sh=>hitTest(sh,x,y));
  if(idx>=0)showMenu(idx,e.clientX,e.clientY);
  else hideMenu();
});

/* ── OVERLAY MOUSE (drawing mode) ── */
function evtPt(e){
  const r=cv.getBoundingClientRect();const x=e.clientX-r.left,y=e.clientY-r.top;
  return{x,y,logical:S.chart.timeScale().coordinateToLogical(x),price:S.main.coordinateToPrice(y)};
}
/* Detect whether the cursor is over a draggable handle/body of an existing shape,
   so already-drawn shapes (trend lines, zones, fib, S/R) can be readjusted. */
function isSelect(){return D.tool==='cursor'||D.tool==='crosshair';}
function hitHandle(x,y){
  if(!S.main)return null;
  for(let i=D.shapes.length-1;i>=0;i--){
    const sh=D.shapes[i];
    if(sh.type==='hline'){
      const cy=S.main.priceToCoordinate(sh.a.price);
      if(cy!=null&&Math.abs(y-cy)<8)return{idx:i,which:'line'};
    }else if(sh.type==='vline'){
      const cx=S.chart.timeScale().logicalToCoordinate(sh.a.logical);
      if(cx!=null&&Math.abs(x-cx)<8)return{idx:i,which:'vline'};
    }else if(sh.type==='text'){
      const a=px(sh.a);if(a&&dpt({x,y},a)<18)return{idx:i,which:'a'};
    }else if(sh.a&&sh.b){
      const a=px(sh.a),b=px(sh.b);
      if(a&&Math.hypot(x-a.x,y-a.y)<13)return{idx:i,which:'a'};
      if(b&&Math.hypot(x-b.x,y-b.y)<13)return{idx:i,which:'b'};
      if(hitTest(sh,x,y))return{idx:i,which:'move'};
    }
  }
  return null;
}
/* In cursor mode, grabbing a handle/body starts an edit-drag. We flip the overlay
   to capture mouse moves so the chart itself doesn't pan while you readjust. */
document.getElementById('chartWrap').addEventListener('mousedown',e=>{
  if(!isSelect()||!S.chart||!S.main)return;
  const rect=document.getElementById('chartWrap').getBoundingClientRect();
  const x=e.clientX-rect.left,y=e.clientY-rect.top;
  const h=hitHandle(x,y);
  if(h){
    D.editing={idx:h.idx,which:h.which,last:null};
    D.justEdited=false;D.selected=h.idx;
    cv.style.pointerEvents='auto';
    // Freeze the chart so readjusting a drawing doesn't pan/zoom the whole chart.
    try{S.chart.applyOptions({handleScroll:false,handleScale:false});}catch(err){}
    e.preventDefault();
    redrawOverlay();
  }
});
cv.addEventListener('mousedown',e=>{
  if(isSelect()||!S.chart||!S.main)return;
  const p=evtPt(e);if(p.logical==null||p.price==null)return;
  if(p.y>pricePaneH())return;
  if(D.tool==='hline'){D.shapes.push({type:'hline',a:{logical:0,price:p.price},b:null,color:'#dc2626'});redrawOverlay();setTool('cursor');return;}
  if(D.tool==='vline'){D.shapes.push({type:'vline',a:{logical:p.logical,price:p.price},b:null,color:'#0891b2'});redrawOverlay();setTool('cursor');return;}
  if(D.tool==='text'){const t=window.prompt('Label text:','');if(t&&t.trim()){D.shapes.push({type:'text',a:{logical:p.logical,price:p.price},b:null,text:t.trim(),color:'#374151'});redrawOverlay();}setTool('cursor');return;}
  D.dragging=true;
  D.temp={type:D.tool,a:{logical:p.logical,price:p.price},b:{logical:p.logical,price:p.price},
    color:D.tool==='fib'?'#d97706':D.tool==='measure'?'#2d7d52':'#2d7d52'};
});
cv.addEventListener('mousemove',e=>{
  // Edit-drag of an existing shape (readjust endpoints / move / drag S-R line)
  if(D.editing){
    const sh=D.shapes[D.editing.idx];if(!sh)return;
    const p=evtPt(e);if(p.price==null)return;
    D.justEdited=true;
    if(D.editing.which==='line'){sh.a.price=p.price;}
    else if(D.editing.which==='vline'){if(p.logical!=null)sh.a.logical=p.logical;}
    else if(D.editing.which==='a'){if(p.logical!=null){const keep=sh.text;sh.a={logical:p.logical,price:p.price};if(keep)sh.text=keep;}}
    else if(D.editing.which==='b'){if(p.logical!=null)sh.b={logical:p.logical,price:p.price};}
    else if(D.editing.which==='move'){
      if(D.editing.last&&p.logical!=null){
        const dl=p.logical-D.editing.last.logical,dp=p.price-D.editing.last.price;
        sh.a.logical+=dl;sh.a.price+=dp;if(sh.b){sh.b.logical+=dl;sh.b.price+=dp;}
      }
      D.editing.last={logical:p.logical,price:p.price};
    }
    redrawOverlay();return;
  }
  if(!D.dragging||!D.temp)return;
  const p=evtPt(e);if(p.logical==null||p.price==null)return;
  D.temp.b={logical:p.logical,price:p.price};redrawOverlay();
});
window.addEventListener('mouseup',()=>{
  if(D.editing){
    D.editing=null;cv.style.pointerEvents=isSelect()?'none':'auto';
    try{S.chart.applyOptions({handleScroll:true,handleScale:true});}catch(err){}
    redrawOverlay();return;
  }
  if(D.dragging&&D.temp){D.shapes.push(D.temp);D.temp=null;D.dragging=false;redrawOverlay();setTool('cursor');}
});

function setTool(t){
  D.tool=t;
  ['cursor','crosshair','trend','hline','vline','rect','fib','text','measure'].forEach(x=>{const b=document.getElementById('d'+x[0].toUpperCase()+x.slice(1));if(b)b.classList.toggle('on',x===t);});
  // select modes (cursor/crosshair): overlay ignores pointer so chart can pan; click handled on chartWrap
  cv.style.pointerEvents=isSelect()?'none':'auto';
  cv.style.cursor=isSelect()?'default':'crosshair';
  // crosshair tool snaps the chart crosshair to data points (magnet)
  try{if(S.chart)S.chart.applyOptions({crosshair:{mode:t==='crosshair'?LWC.CrosshairMode.Magnet:LWC.CrosshairMode.Normal}});}catch(err){}
}
function undoDraw(){if(D.shapes.length){D.shapes.pop();D.selected=-1;hideMenu();redrawOverlay();}}
function clearDraw(){D.shapes=[];D.temp=null;D.selected=-1;hideMenu();redrawOverlay();}

/* ── EXPORT ── */
function exportPNG(){
  if(!S.chart)return;
  try{
    const base=S.chart.takeScreenshot(),out=document.createElement('canvas');
    out.width=base.width;out.height=base.height;const ctx=out.getContext('2d');ctx.drawImage(base,0,0);
    const sx=base.width/cv.clientWidth,sy=base.height/cv.clientHeight;
    ctx.drawImage(cv,0,0,cv.width,cv.height,0,0,cv.clientWidth*sx,cv.clientHeight*sy);
    // Chartix watermark — centered diagonal + corner tag, so shared images advertise the site.
    ctx.save();
    ctx.translate(out.width/2,out.height/2);ctx.rotate(-18*Math.PI/180);
    ctx.font='700 '+Math.round(out.width/14)+'px Sora, sans-serif';
    ctx.fillStyle='rgba(45,125,82,0.10)';ctx.textAlign='center';ctx.textBaseline='middle';
    ctx.fillText('chartix.in',0,0);ctx.restore();
    ctx.save();
    ctx.font='700 '+Math.round(out.width/55)+'px Sora, sans-serif';
    ctx.fillStyle='rgba(45,125,82,0.55)';ctx.textAlign='right';ctx.textBaseline='bottom';
    ctx.fillText('chartix.in',out.width-16,out.height-12);ctx.restore();
    const a=document.createElement('a');a.download='chartix_'+(S.title.replace(/[^\w]+/g,'_')||'index')+'.png';a.href=out.toDataURL('image/png');a.click();
  }catch(e){console.error(e);}
}

/* ════════ INDICATOR PICKER MODAL ════════ */
function openIndModal(){
  if(!S.times.length){showMsg('Build an index first, then add indicators.','err');return;}
  document.getElementById('indModal').classList.add('open');
  const inp=document.getElementById('indSearch');inp.value='';renderIndList('');inp.focus();
}
function closeIndModal(){document.getElementById('indModal').classList.remove('open');}
function renderIndList(q){
  q=(q||'').toLowerCase().trim();
  const list=document.getElementById('indList');
  const cats={};
  Object.keys(IND_DEFS).forEach(type=>{
    const d=IND_DEFS[type];
    if(q&&d.name.toLowerCase().indexOf(q)<0&&d.short.toLowerCase().indexOf(q)<0&&d.cat.toLowerCase().indexOf(q)<0)return;
    (cats[d.cat]=cats[d.cat]||[]).push(type);
  });
  let html='';
  Object.keys(cats).forEach(cat=>{
    html+='<div class="ind-cat">'+cat+'</div>';
    cats[cat].forEach(type=>{
      const d=IND_DEFS[type];
      html+='<div class="ind-row" data-type="'+type+'"><span class="ic" style="background:'+d.color+'">'+d.short.slice(0,4)+'</span>'+
        '<span class="meta"><span class="nm">'+d.name+'</span><span class="ds">'+d.cat+'</span></span><span class="plus">+</span></div>';
    });
  });
  list.innerHTML=html||'<div class="ind-cat">No matches</div>';
  list.querySelectorAll('.ind-row').forEach(r=>{
    r.onclick=async()=>{closeIndModal();await addIndicator(r.dataset.type);};
  });
}

/* ════════ INDICATOR SETTINGS POPOVER ════════ */
function openIndSettings(id,anchor){
  const inst=S.indicators.find(x=>x.id===id);if(!inst)return;
  const d=IND_DEFS[inst.type],set=document.getElementById('indSet');
  set.dataset.id=String(id);
  document.getElementById('indSetTitle').textContent=pillLabel(inst);
  const body=document.getElementById('indSetBody');
  let html='';
  if(d.params.length){
    html+='<div class="sect">Inputs</div>';
    d.params.forEach(p=>{
      html+='<div class="fl"><label>'+p.label+'</label><input type="number" data-p="'+p.k+'" value="'+inst.params[p.k]+'" min="'+(p.min||1)+'" max="'+(p.max||999)+'" step="'+(p.step||1)+'"></div>';
    });
  }
  if(d.source){
    html+='<div class="fl"><label>Source</label><select data-src>'+
      ['close','open','high','low'].map(s=>'<option value="'+s+'"'+(inst.source===s?' selected':'')+(s!=='close'&&!S.ohlc?' disabled':'')+'>'+s[0].toUpperCase()+s.slice(1)+'</option>').join('')+'</select></div>';
  }
  html+='<div class="sect">Style</div>';
  html+='<div class="fl"><label>Color</label><input type="color" data-st="color" value="'+inst.style.color+'"></div>';
  if(inst.type!=='vol'){
    html+='<div class="fl"><label>Line width</label><select data-st="lineWidth">'+[1,2,3,4].map(w=>'<option value="'+w+'"'+(inst.style.lineWidth===w?' selected':'')+'>'+w+'px</option>').join('')+'</select></div>';
    html+='<div class="fl"><label>Line style</label><select data-st="lineStyle">'+['solid','dashed','dotted'].map(s=>'<option value="'+s+'"'+(inst.style.lineStyle===s?' selected':'')+'>'+s[0].toUpperCase()+s.slice(1)+'</option>').join('')+'</select></div>';
  }
  html+='<div class="fl"><label>Opacity</label><input type="range" data-st="opacity" min="0.2" max="1" step="0.05" value="'+inst.style.opacity+'"></div>';
  body.innerHTML=html;
  // live updates
  body.querySelectorAll('[data-p]').forEach(el=>el.oninput=()=>{const v=parseFloat(el.value);if(!isNaN(v))updateIndicator(id,{[el.dataset.p]:v});document.getElementById('indSetTitle').textContent=pillLabel(inst);});
  const srcEl=body.querySelector('[data-src]');if(srcEl)srcEl.onchange=()=>updateIndicator(id,null,null,srcEl.value);
  body.querySelectorAll('[data-st]').forEach(el=>{
    const k=el.dataset.st;
    el.oninput=()=>{let v=el.value;if(k==='lineWidth')v=+v;if(k==='opacity')v=+v;updateIndicator(id,null,{[k]:v});};
  });
  document.getElementById('indSetRemove').onclick=()=>removeIndicator(id);
  // position near anchor pill
  set.classList.add('open');
  const r=anchor.getBoundingClientRect(),sw=set.offsetWidth,sh=set.offsetHeight;
  let left=Math.min(r.left,window.innerWidth-sw-12);left=Math.max(12,left);
  let top=r.bottom+8;if(top+sh>window.innerHeight-10)top=Math.max(10,r.top-sh-8);
  set.style.left=left+'px';set.style.top=top+'px';
}
function closeIndSettings(){const s=document.getElementById('indSet');s.classList.remove('open');s.dataset.id='';}
document.getElementById('indSetClose').onclick=closeIndSettings;
document.addEventListener('mousedown',e=>{

});

  .cloud-tools input,.cloud-tools select{border:1px solid #dadce0;border-radius:8px;padding:7px 10px;font-size:13px}
  .cloud-tools input{flex:1;min-width:140px}
  .cloud-body{overflow-y:auto;padding:12px 18px}
  .ix-card{display:flex;align-items:flex-start;gap:10px;border:1px solid #eef0f2;border-radius:10px;padding:11px 12px;margin-bottom:8px}
  .ix-card .meta{flex:1;min-width:0}
  .ix-card .nm{font-weight:600;font-size:14px;color:#1a2b22}
  .ix-card .ds{font-size:12px;color:#6b7280;margin-top:1px}
  .ix-card .ct{font-size:11px;color:#2d7d52;font-weight:600;margin-top:3px}
  .ix-card .acts{display:flex;gap:5px;flex-wrap:wrap;justify-content:flex-end}
  .ix-card .mini{border:1px solid #dadce0;background:#fff;border-radius:7px;padding:5px 9px;font-size:12px;cursor:pointer;color:#3c4043}
  .ix-card .mini.primary{background:#2d7d52;color:#fff;border-color:#2d7d52}
  .ix-card .mini.danger{color:#c0392b;border-color:#f0c5c0}
  .cloud-empty{text-align:center;color:#9aa0a6;font-size:13px;padding:28px 10px}
</style>
<div class="cloud-modal" id="rmModal"><div class="cloud-card">
  <div class="cloud-head"><h3>Index Library</h3><button class="x" data-close>×</button></div>
  <div class="cloud-tools">
    <input type="text" id="rmSearch" placeholder="Search indices…">
    <select id="rmCat"><option value="">All categories</option></select>
  </div>
  <div class="cloud-body" id="rmList"></div>
</div></div>
<div class="cloud-modal" id="myModal"><div class="cloud-card">
  <div class="cloud-head"><h3>My indices</h3><button class="x" data-close>×</button></div>
  <div class="cloud-body" id="myList"></div>
</div></div>

<!-- Load options dialog -->
<div class="cloud-modal" id="loadOptModal">
  <div class="lopt-card">
    <div class="lopt-title" id="loptName">Sugar Index</div>
    <div class="lopt-sub" id="loptSub">12 stocks</div>
    <div class="lopt-lbl">Weighting</div>
    <div class="lopt-pills" id="loptWeight">
      <button class="lopt-pill on" data-w="mcap">Market-cap</button>
      <button class="lopt-pill" data-w="equal">Equal weight</button>
    </div>
    <div class="lopt-lbl">Time period</div>
    <div class="lopt-pills" id="loptPeriod">
      <button class="lopt-pill" data-p="1">1 Year</button>
      <button class="lopt-pill on" data-p="2">2 Years</button>
      <button class="lopt-pill" data-p="5">5 Years</button>
      <button class="lopt-pill" data-p="10">Max</button>
    </div>
    <button class="lopt-go" id="loptGo">Load &amp; Build →</button>
    <button class="lopt-cancel" id="loptCancel">Cancel</button>
  </div>
</div>

<script>
(function(){
  var TOOL_URL='/index-builder-app/index.html';
  var session=null, currentId=null, currentShareId=null, dirty=false, lastSaveText='';

  function api(path,opts){ return fetch(path,Object.assign({credentials:'same-origin',headers:{'Content-Type':'application/json'}},opts||{})); }
  function esc(s){return String(s==null?'':s).replace(/[&<>"]/g,function(c){return{'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c];});}
  function setStatus(t){ lastSaveText=t; var el=document.getElementById('saveStatus'); if(el)el.textContent=t; }

  // ── current builder state ↔ saved-index shape ──
  function mapWeightToApi(){ return S.weightMode==='equal'?'EQUAL':'MARKET_CAP'; }
  function getState(){
    var rows=[].slice.call(document.querySelectorAll('#stockList [data-row]'));
    var constituents=[], customWeights={};
    rows.forEach(function(r){
      var tk=r.querySelector('.sc-tk').value.trim().toUpperCase();
      if(!tk)return;
      constituents.push(tk);
      var sh=parseFloat((r.querySelector('.sc-sh').value||'').replace(/,/g,''));
      if(!isNaN(sh)&&sh>0)customWeights[tk]=sh;
    });
    // capture full chart state so it can be restored on load
    var activeRange=document.querySelector('#rangePresets button.on');
    var chartState={
      chartType:S.chartType||'area',
      tf:S.tf||'D',
      rangePreset:activeRange?activeRange.getAttribute('data-yrs'):null,
      gStart:(document.getElementById('gStart')||{}).value||null,
      gEnd:(document.getElementById('gEnd')||{}).value||null,
      drawings:D.shapes.map(function(sh){ return JSON.parse(JSON.stringify(sh)); }),
      indicators:S.indicators.map(function(inst){
        var copy=Object.assign({},inst,{style:Object.assign({},inst.style)});
        delete copy._series; delete copy._pane; return copy;
      })
    };
    return {
      name:(document.getElementById('idxName').value.trim()||'Untitled index'),
      weightingType:mapWeightToApi(),
      constituents:constituents,
      customWeights:Object.keys(customWeights).length?customWeights:null,
      chartState:chartState,
      description:null
    };
  }
  async function applyState(ix){
    document.getElementById('idxName').value=ix.name||'';
    setWeight(ix.weightingType==='EQUAL'?'equal':'mcap');
    var list=document.getElementById('stockList'); list.innerHTML='';
    var cw=ix.customWeights||{};
    (ix.constituents||[]).forEach(function(sym){ addStockRow(sym, cw[sym]!=null?cw[sym]:undefined); });
    if(!(ix.constituents||[]).length){ addStockRow(); addStockRow(); }
    updateStkCount();

    var cs=ix.chartState||{};

    // restore chart type button state before build (buildChart reads S.chartType)
    if(cs.chartType&&typeof setChartType==='function'){
      S.chartType=cs.chartType; // set directly to avoid buildChart before data ready
      ['Area','Line','Candle'].forEach(function(x){
        var b=document.getElementById('btn'+x); if(b)b.classList.toggle('on',x.toLowerCase()===cs.chartType);
      });
    }

    // restore timeframe button state before build
    if(cs.tf){
      S.tf=cs.tf;
      ['D','W','M'].forEach(function(t){
        var b=document.getElementById('tf'+t); if(b)b.classList.toggle('on',t===cs.tf);
      });
    }

    // restore date range
    if(cs.rangePreset){
      var rangeBtn=document.querySelector('#rangePresets [data-yrs="'+cs.rangePreset+'"]');
      if(rangeBtn){ document.querySelectorAll('#rangePresets button').forEach(function(b){b.classList.remove('on');}); rangeBtn.classList.add('on'); rangeBtn.click(); }
    } else if(cs.gStart&&cs.gEnd){
      document.querySelectorAll('#rangePresets button').forEach(function(b){b.classList.remove('on');});
      var gs=document.getElementById('gStart'), ge=document.getElementById('gEnd');
      if(gs)gs.value=cs.gStart; if(ge)ge.value=cs.gEnd;
    }

    renderChips();

    // build the chart — shares are already filled in from customWeights above so no need to re-fetch
    await fetchAndBuild();

    // restore drawings after chart is built
    if(cs.drawings&&cs.drawings.length){
      D.shapes=cs.drawings.map(function(sh){ return JSON.parse(JSON.stringify(sh)); });
      if(typeof redrawOverlay==='function')redrawOverlay();
    }

    // restore indicators after chart is built
    if(cs.indicators&&cs.indicators.length){
      // clear any indicators that fetchAndBuild may have left
      S.indicators.forEach(function(inst){ (inst._series||[]).forEach(function(s){ try{S.chart.removeSeries(s);}catch(e){} }); });
      S.indicators=[];
      for(var i=0;i<cs.indicators.length;i++){
        var saved=cs.indicators[i];
        var def=typeof IND_DEFS!=='undefined'?IND_DEFS[saved.type]:null; if(!def)continue;
        if(def.sym){ var ok=await fetchBenchmark(def.sym); if(!ok)continue; }
        S.indicators.push(Object.assign({},saved,{_series:[]}));
      }
      if(S.chart&&typeof renderIndicators==='function')renderIndicators();
    }
  }

  // ── auth ──
  function loginHref(){ return '/sign-in?next='+encodeURIComponent(TOOL_URL); }
  function renderAccount(){
    var el=document.getElementById('cloudAcct'); if(!el)return;
    if(session&&session.user){
      var u=session.user;
      el.innerHTML=(u.image?'<img src="'+esc(u.image)+'" alt="">':'')+
        '<span class="nm">'+esc(u.name||u.email||'You')+'</span>'+
        '<span class="lnk" id="logoutLnk">Logout</span>';
      var lo=document.getElementById('logoutLnk'); if(lo)lo.onclick=function(){ window.location.href='/api/auth/signout?callbackUrl='+encodeURIComponent(TOOL_URL); };
    } else {
      el.innerHTML='<a class="gbtn" href="'+loginHref()+'">Continue with Google</a>';
    }
  }
  function requireLogin(){ if(session&&session.user)return true; window.location.href=loginHref(); return false; }

  // ── save / autosave ──
  function markDirty(){ dirty=true; }
  async function doSave(forceNew){
    if(!(session&&session.user))return false;
    var st=getState();
    if(st.constituents.length<1){ return false; }
    try{
      var res, payload;
      if(forceNew||!currentId){
        res=await api('/api/index-builder/indices',{method:'POST',body:JSON.stringify(st)});
      } else {
        res=await api('/api/index-builder/indices/'+currentId,{method:'PATCH',body:JSON.stringify(st)});
      }
      if(res.status===401){ setStatus('Sign in to save'); return false; }
      payload=await res.json();
      if(!res.ok||!payload.success){ setStatus(payload&&payload.error?payload.error.message:'Save failed'); return false; }
      currentId=payload.data.id; currentShareId=payload.data.shareId;
      dirty=false; setStatus('Saved just now');
      return true;
    }catch(e){ setStatus('Save failed — check connection'); return false; }
  }
  // periodic + debounced autosave
  setInterval(function(){ if(dirty&&session&&session.user&&currentId)doSave(false); },30000);
  var debTimer=null;
  function scheduleAutosave(){ markDirty(); if(!(session&&session.user))return; clearTimeout(debTimer); debTimer=setTimeout(function(){ if(currentId)doSave(false); },2500); }

  // ── ready-made modal ──
  var readyMade=null;
  async function openReadyMade(){
    var m=document.getElementById('rmModal'); m.classList.add('open');
    if(!readyMade){
      try{ var r=await fetch('/index-builder-app/data/sectorIndices.json'); readyMade=await r.json(); }
      catch(e){ document.getElementById('rmList').innerHTML='<div class="cloud-empty">Could not load ready-made indices.</div>'; return; }
      var cats=[]; Object.keys(readyMade).forEach(function(k){ var c=readyMade[k].category; if(cats.indexOf(c)<0)cats.push(c); });
      cats.sort(); var sel=document.getElementById('rmCat');
      cats.forEach(function(c){ var o=document.createElement('option'); o.value=c; o.textContent=c; sel.appendChild(o); });
    }
    renderReadyMade();
  }
  function renderReadyMade(){
    var q=(document.getElementById('rmSearch').value||'').toLowerCase();
    var cat=document.getElementById('rmCat').value;
    var list=document.getElementById('rmList'); var html='';
    Object.keys(readyMade).forEach(function(k){
      var x=readyMade[k];
      if(cat&&x.category!==cat)return;
      if(q&&x.name.toLowerCase().indexOf(q)<0&&x.description.toLowerCase().indexOf(q)<0)return;
      html+='<div class="ix-card"><div class="meta"><div class="nm">'+esc(x.name)+'</div>'+
        '<div class="ds">'+esc(x.description)+'</div>'+
        '<div class="ct">'+esc(x.category)+' · '+x.constituents.length+' stocks</div></div>'+
        '<div class="acts"><button class="mini primary" data-rm="'+esc(k)+'">Load</button></div></div>';
    });
    list.innerHTML=html||'<div class="cloud-empty">No indices match.</div>';
    list.querySelectorAll('[data-rm]').forEach(function(b){ b.onclick=function(){ loadReadyMade(readyMade[b.getAttribute('data-rm')]); }; });
  }
  var _pendingRM=null;
  function loadReadyMade(x){
    // Show the load-options dialog instead of loading immediately
    _pendingRM=x;
    document.getElementById('loptName').textContent=x.name||'Index';
    document.getElementById('loptSub').textContent=(x.constituents?x.constituents.length:0)+' stocks · '+esc(x.category||'');
    // reset pills to defaults
    document.querySelectorAll('#loptWeight .lopt-pill').forEach(function(b){b.classList.toggle('on',b.dataset.w==='mcap');});
    document.querySelectorAll('#loptPeriod .lopt-pill').forEach(function(b){b.classList.toggle('on',b.dataset.p==='2');});
    document.getElementById('rmModal').classList.remove('open');
    document.getElementById('loadOptModal').classList.add('open');
  }
  async function applyReadyMade(x, weight, years){
    currentId=null; currentShareId=null;
    document.getElementById('idxName').value=x.name||'';
    setWeight(weight);
    var list=document.getElementById('stockList'); list.innerHTML='';
    x.constituents.forEach(function(sym){ addStockRow(sym); });
    if(weight==='mcap'){
      // await all share fetches before building so fetchAndBuild sees the values
      var cards=[].slice.call(document.querySelectorAll('#stockList [data-row]'));
      var promises=cards.map(function(card){
        var tk=(card.querySelector('.sc-tk').value||'').trim();
        if(tk&&typeof fetchShares==='function'){
          try{ return fetchShares(card,(typeof ySym==='function'?ySym(tk):tk)); }catch(e){}
        }
        return Promise.resolve();
      });
      document.getElementById('fetchStatus').textContent='Fetching share data…';
      await Promise.all(promises);
      document.getElementById('fetchStatus').textContent='';
    }
    // set date range
    var rangeBtn=document.querySelector('#rangePresets [data-yrs="'+years+'"]');
    if(rangeBtn){ document.querySelectorAll('#rangePresets button').forEach(function(b){b.classList.remove('on');}); rangeBtn.classList.add('on'); rangeBtn.click(); }
    if(typeof updateStkCount==='function')updateStkCount();
    renderChips();
    setStatus(session&&session.user?'Loaded — Save to keep your copy':'Loaded — sign in to save');
    markDirty();
    fetchAndBuild();
  }

  // ── my indices modal ──
  async function openMyIndices(){
    if(!requireLogin())return;
    var m=document.getElementById('myModal'); m.classList.add('open');
    var list=document.getElementById('myList'); list.innerHTML='<div class="cloud-empty">Loading…</div>';
    try{
      var res=await api('/api/index-builder/indices'); var p=await res.json();
      if(!res.ok||!p.success){ list.innerHTML='<div class="cloud-empty">Could not load.</div>'; return; }
      if(!p.data.length){ list.innerHTML='<div class="cloud-empty">No saved indices yet. Build one and hit Save.</div>'; return; }
      list.innerHTML=p.data.map(function(ix){
        return '<div class="ix-card" data-id="'+esc(ix.id)+'"><div class="meta">'+
          '<div class="nm">'+esc(ix.name)+'</div>'+
          '<div class="ct">'+(ix.weightingType==='EQUAL'?'Equal weight':'Market cap')+' · '+ix.constituents.length+' stocks'+(ix.visibility==='PUBLIC'?' · Public':'')+'</div></div>'+
          '<div class="acts">'+
            '<button class="mini primary" data-act="load">Load</button>'+
            '<button class="mini" data-act="rename">Rename</button>'+
            '<button class="mini" data-act="dup">Duplicate</button>'+
            '<button class="mini danger" data-act="del">Delete</button>'+
          '</div></div>';
      }).join('');
      var byId={}; p.data.forEach(function(ix){byId[ix.id]=ix;});
      list.querySelectorAll('.ix-card').forEach(function(card){
        var id=card.getAttribute('data-id'); var ix=byId[id];
        card.querySelector('[data-act=load]').onclick=async function(){ currentId=ix.id; currentShareId=ix.shareId; document.getElementById('myModal').classList.remove('open'); setStatus('Loading…'); await applyState(ix); setStatus('Loaded "'+ix.name+'"'); dirty=false; };
        card.querySelector('[data-act=rename]').onclick=async function(){ var nn=prompt('Rename index',ix.name); if(!nn)return; await api('/api/index-builder/indices/'+id,{method:'PATCH',body:JSON.stringify({name:nn.trim()})}); openMyIndices(); };
        card.querySelector('[data-act=dup]').onclick=async function(){ await api('/api/index-builder/indices',{method:'POST',body:JSON.stringify({name:ix.name+' (copy)',weightingType:ix.weightingType,constituents:ix.constituents,customWeights:ix.customWeights,description:ix.description})}); openMyIndices(); };
        card.querySelector('[data-act=del]').onclick=async function(){ if(!confirm('Delete "'+ix.name+'"?'))return; await api('/api/index-builder/indices/'+id,{method:'DELETE'}); if(currentId===id){currentId=null;currentShareId=null;} openMyIndices(); };
      });
    }catch(e){ list.innerHTML='<div class="cloud-empty">Could not load.</div>'; }
  }

  // ── inject the cloud UI into the Build pane ──
  // ── constituent chips (visible mirror of the hidden #stockList rows) ──
  function renderChips(){
    var strip=document.getElementById('chipStrip'); if(!strip)return;
    var rows=[].slice.call(document.querySelectorAll('#stockList [data-row]'));
    strip.innerHTML='';
    rows.forEach(function(r,i){
      var tk=(r.querySelector('.sc-tk').value||'').trim().toUpperCase();
      if(!tk)return;
      var chip=document.createElement('span'); chip.className='chip';
      chip.innerHTML=esc(tk)+'<button class="cx" title="Remove">×</button>';
      chip.querySelector('.cx').onclick=function(){ r.remove(); if(typeof updateStkCount==='function')updateStkCount(); renderChips(); scheduleAutosave(); };
      strip.appendChild(chip);
    });
  }
  // add a stock (from the top search) → hidden row + chip; auto-fetch shares for market-cap
  function addStock(sym){
    sym=(sym||'').trim().toUpperCase(); if(!sym)return;
    var existing=[].slice.call(document.querySelectorAll('#stockList .sc-tk')).map(function(i){return (i.value||'').trim().toUpperCase();});
    if(existing.indexOf(sym)>=0)return; // no duplicates
    addStockRow(sym);
    var card=document.querySelector('#stockList [data-row]:last-child');
    if(card&&S.weightMode!=='equal'&&typeof fetchShares==='function'){ try{ fetchShares(card, (typeof ySym==='function'?ySym(sym):sym)); }catch(e){} }
    renderChips();
  }
  // ── top search autocomplete ──
  function initTopSearch(){
    var inp=document.getElementById('topSearch'), drop=document.getElementById('topAcDrop'); if(!inp)return;
    var hi=-1;
    function render(q){
      var res=(typeof acSearch==='function')?acSearch(q):[]; hi=-1;
      if(!res.length){drop.classList.remove('open');return;}
      drop.innerHTML=res.map(function(r){return '<div class="ac-item" data-sym="'+esc(r[0])+'"><span class="ac-sym">'+esc(r[0])+'</span><span class="ac-name">'+esc(r[1])+'</span></div>';}).join('');
      drop.querySelectorAll('.ac-item').forEach(function(el){ el.addEventListener('mousedown',function(e){e.preventDefault();pick(el.dataset.sym);}); });
      drop.classList.add('open');
    }
    function pick(sym){ addStock(sym); inp.value=''; drop.classList.remove('open'); inp.focus(); }
    inp.addEventListener('input',function(){render(inp.value);});
    inp.addEventListener('keydown',function(e){
      var items=drop.querySelectorAll('.ac-item');
      if(e.key==='ArrowDown'){e.preventDefault();hi=Math.min(hi+1,items.length-1);items.forEach(function(el,i){el.classList.toggle('hi',i===hi);});}
      else if(e.key==='ArrowUp'){e.preventDefault();hi=Math.max(hi-1,-1);items.forEach(function(el,i){el.classList.toggle('hi',i===hi);});}
      else if(e.key==='Enter'){e.preventDefault();if(hi>=0)pick(items[hi].dataset.sym);else if(items.length===1)pick(items[0].dataset.sym);}
      else if(e.key==='Escape')drop.classList.remove('open');
    });
    inp.addEventListener('blur',function(){setTimeout(function(){drop.classList.remove('open');},160);});
  }
  // ── date-range presets ──
  function initRange(){
    var box=document.getElementById('rangePresets'); if(!box)return;
    box.querySelectorAll('button').forEach(function(b){
      b.onclick=function(){
        box.querySelectorAll('button').forEach(function(x){x.classList.remove('on');}); b.classList.add('on');
        var yrs=parseInt(b.getAttribute('data-yrs'),10)||2;
        var end=new Date(), start=new Date(); start.setFullYear(end.getFullYear()-yrs);
        if(typeof toKey==='function'){ document.getElementById('gStart').value=toKey(start); document.getElementById('gEnd').value=toKey(end); }
        scheduleAutosave();
      };
    });
  }
  // ── settings popover ──
  function initSettings(){
    var btn=document.getElementById('btnSettings'), pop=document.getElementById('settingsPop'); if(!btn)return;
    btn.onclick=function(e){ e.stopPropagation(); pop.classList.toggle('open'); };
    document.addEventListener('click',function(e){ if(pop.classList.contains('open')&&!pop.contains(e.target)&&e.target!==btn)pop.classList.remove('open'); });
  }

  function injectUI(){
    renderAccount();
    var bR=document.getElementById('btnReady'); if(bR)bR.onclick=openReadyMade;
    var bM=document.getElementById('btnMine'); if(bM)bM.onclick=openMyIndices;
    var bS=document.getElementById('btnSave'); if(bS)bS.onclick=async function(){ if(!requireLogin())return; await doSave(false); };
    // modal close handlers
    document.querySelectorAll('.cloud-modal').forEach(function(m){
      m.addEventListener('click',function(e){ if(e.target===m||e.target.hasAttribute('data-close'))m.classList.remove('open'); });
    });
    // load-options dialog
    document.querySelectorAll('#loptWeight .lopt-pill').forEach(function(b){
      b.onclick=function(){ document.querySelectorAll('#loptWeight .lopt-pill').forEach(function(x){x.classList.remove('on');}); b.classList.add('on'); };
    });
    document.querySelectorAll('#loptPeriod .lopt-pill').forEach(function(b){
      b.onclick=function(){ document.querySelectorAll('#loptPeriod .lopt-pill').forEach(function(x){x.classList.remove('on');}); b.classList.add('on'); };
    });
    document.getElementById('loptGo').onclick=function(){
      if(!_pendingRM)return;
      var w=document.querySelector('#loptWeight .lopt-pill.on');
      var p=document.querySelector('#loptPeriod .lopt-pill.on');
      var weight=w?w.dataset.w:'mcap';
      var years=p?parseInt(p.dataset.p,10):2;
      document.getElementById('loadOptModal').classList.remove('open');
      applyReadyMade(_pendingRM, weight, years);
      _pendingRM=null;
    };
    document.getElementById('loptCancel').onclick=function(){
      document.getElementById('loadOptModal').classList.remove('open');
      _pendingRM=null;
    };
    document.getElementById('rmSearch').addEventListener('input',renderReadyMade);
    document.getElementById('rmCat').addEventListener('change',renderReadyMade);
    initTopSearch(); initRange(); initSettings();
    // change detection for autosave + keep chips in sync with the hidden row store
    document.getElementById('idxName').addEventListener('input',scheduleAutosave);
    document.getElementById('wMcap').addEventListener('click',scheduleAutosave);
    document.getElementById('wEqual').addEventListener('click',scheduleAutosave);
    var sl=document.getElementById('stockList');
    new MutationObserver(function(){ renderChips(); scheduleAutosave(); }).observe(sl,{childList:true});
    sl.addEventListener('input',scheduleAutosave);
    renderChips();
  }

  // ── restore last index on load (most recently updated) ──
  async function restore(){
    if(!(session&&session.user))return;
    try{
      var res=await api('/api/index-builder/indices'); var p=await res.json();
      if(res.ok&&p.success&&p.data.length){ var ix=p.data[0]; currentId=ix.id; currentShareId=ix.shareId; applyState(ix); setStatus('Restored "'+ix.name+'"'); dirty=false; }
    }catch(e){}
  }

  // ── boot ──
  (async function(){
    try{ var r=await api('/api/auth/session'); session=await r.json(); }catch(e){ session=null; }
    if(session&&!session.user)session=null;
    injectUI();
    renderAccount();
    await restore();
  })();
})();
</script>
</body>
</html>
