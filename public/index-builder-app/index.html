<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Chartix Index Builder — Build Custom Market-Cap &amp; Equal-Weight Indices</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@500;600;700&family=IBM+Plex+Sans:wght@400;500;600&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<script src="https://unpkg.com/lightweight-charts@5.0.8/dist/lightweight-charts.standalone.production.js"></script>
<script src="stocks.js"></script>
<style>
:root{
  --bg:#eef2f1; --panel:#ffffff; --panel-2:#f3faf6; --line:#e6ecea;
  --line-soft:#eef2f1; --txt:#0f172a; --txt-dim:#374151; --txt-mut:#6b7280;
  --accent:#0f7b5a; --accent-dim:#0b6047;
  --topbar:#0c3b29; --topbar-soft:rgba(255,255,255,.12);
  --up:#16a34a; --down:#dc2626; --idx:#0f7b5a;
  --ma1:#d97706; --ma2:#7c3aed; --ema:#0891b2; --bb:#64748b;
  --grid:#f0fdf7; --chip:#f0fdf7;
  --radius:16px; --radius-sm:11px;
  --shadow:0 1px 2px rgba(16,40,30,.04), 0 4px 16px rgba(16,40,30,.06);
  --shadow-lg:0 8px 30px rgba(16,40,30,.10);
}
*{box-sizing:border-box}
html,body{height:100%}
body{margin:0;background:var(--bg);color:var(--txt);font-family:"IBM Plex Sans",system-ui,sans-serif;font-size:13px;line-height:1.45;-webkit-font-smoothing:antialiased;}
.mono{font-family:"JetBrains Mono",ui-monospace,monospace;font-variant-numeric:tabular-nums}
.app{display:flex;flex-direction:column;height:100vh;min-height:0}
header.top{display:flex;align-items:center;gap:16px;padding:12px 20px;background:var(--topbar);box-shadow:0 2px 12px rgba(12,59,41,.18);position:relative;z-index:30}
.brand{display:flex;align-items:baseline;gap:10px}
.brand .glyph{font-family:"Sora";font-weight:700;font-size:18px;letter-spacing:-.5px;color:#fff}
.brand .glyph::before{content:"◧ ";color:#5fe3a8}
.brand .sub{font-size:11px;color:rgba(255,255,255,.6);letter-spacing:.4px;text-transform:uppercase}
.top .spacer{flex:1}
.tagchip{font-size:10.5px;color:rgba(255,255,255,.85);border:1px solid var(--topbar-soft);padding:4px 10px;border-radius:20px;letter-spacing:.3px;background:var(--topbar-soft)}
main{flex:1;display:flex;min-height:0}
aside{width:340px;flex:none;border-right:1px solid var(--line);background:var(--panel);display:flex;flex-direction:column;min-height:0;box-shadow:2px 0 16px rgba(16,40,30,.05);z-index:10}
.tabs{display:flex;border-bottom:1px solid var(--line)}
.tabs button{flex:1;background:none;border:none;color:var(--txt-mut);font-family:"Sora";font-weight:600;font-size:12px;padding:12px 8px;cursor:pointer;border-bottom:2px solid transparent;letter-spacing:.2px}
.tabs button.active{color:var(--accent);border-bottom-color:var(--accent)}
.tabs button:hover{color:var(--txt-dim)}
.scroll{overflow-y:auto;padding:16px;flex:1;min-height:0}
.scroll::-webkit-scrollbar{width:9px}
.scroll::-webkit-scrollbar-thumb{background:var(--line);border-radius:9px;border:2px solid var(--panel)}
.pane{display:none}.pane.active{display:block}
label.fld{display:block;font-size:11px;color:var(--txt-dim);margin:14px 0 5px;letter-spacing:.3px;font-weight:500}
label.fld:first-child{margin-top:0}
select,input[type=text],input[type=number],textarea{width:100%;background:#fff;border:1px solid var(--line);color:var(--txt);border-radius:var(--radius-sm);padding:8px 9px;font-size:12.5px;font-family:inherit;outline:none;}
select:focus,input:focus,textarea:focus{border-color:var(--accent);box-shadow:0 0 0 2px rgba(45,125,82,.12)}
textarea{font-family:"JetBrains Mono",monospace;font-size:11.5px;line-height:1.5;resize:vertical;min-height:140px;white-space:pre}
.hint{font-size:11px;color:var(--txt-mut);margin-top:6px;line-height:1.5}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:7px;width:100%;background:var(--accent);color:#fff;border:none;font-family:"Sora";font-weight:700;font-size:12.5px;letter-spacing:.2px;padding:11px;border-radius:20px;cursor:pointer;margin-top:16px;}
.btn:hover{background:var(--accent-dim)}
.btn.ghost{background:#fff;color:var(--txt-dim);border:1px solid var(--line);border-radius:20px}
.btn.ghost:hover{border-color:var(--accent);color:var(--accent)}
.divider{height:1px;background:var(--line);margin:18px 0}
.section-title{font-family:"Sora";font-weight:600;font-size:11px;color:var(--accent);text-transform:uppercase;letter-spacing:.7px;margin:0 0 4px}
.msg{margin-top:12px;font-size:11.5px;padding:9px 11px;border-radius:var(--radius-sm);display:none}
.msg.err{display:block;background:rgba(220,38,38,.08);border:1px solid rgba(220,38,38,.25);color:#b91c1c}
.msg.ok{display:block;background:rgba(45,125,82,.08);border:1px solid rgba(45,125,82,.25);color:#166534}
.workspace{flex:1;display:flex;flex-direction:column;min-width:0}
.toolbar{display:flex;align-items:center;gap:6px;padding:8px 12px;border-bottom:1px solid var(--line);background:var(--panel);flex-wrap:wrap}
.tgroup{display:flex;align-items:center;gap:4px;padding:0 8px;border-right:1px solid var(--line-soft)}
.tgroup:last-child{border-right:none}
.tgroup .lbl{font-size:9.5px;color:var(--txt-mut);text-transform:uppercase;letter-spacing:.5px;margin-right:3px}
.tbtn{background:#fff;border:1px solid var(--line);color:var(--txt-dim);border-radius:var(--radius-sm);padding:6px 9px;font-size:11px;cursor:pointer;font-family:inherit;display:inline-flex;align-items:center;gap:5px;white-space:nowrap;}
.tbtn:hover{color:var(--accent);border-color:var(--accent)}
.tbtn.on{background:rgba(45,125,82,.10);border-color:var(--accent);color:var(--accent)}
.tbtn.draw.on{background:rgba(45,125,82,.15);border-color:var(--accent-dim);color:var(--accent-dim)}
.tbtn svg{width:13px;height:13px;display:block}
.miniinp{width:46px;background:#fff;border:1px solid var(--line);color:var(--txt);border-radius:4px;padding:4px 5px;font-size:11px;font-family:"JetBrains Mono";text-align:center}
.chart-wrap{flex:1;position:relative;min-height:0;background:#fff}
#chart{position:absolute;inset:0}
#overlay{position:absolute;inset:0;pointer-events:none;z-index:5;cursor:default}
.legend{position:absolute;top:10px;left:12px;z-index:6;font-family:"JetBrains Mono";font-size:11.5px;pointer-events:none;line-height:1.7;max-width:72%;background:rgba(255,255,255,.86);border:1px solid var(--line);border-radius:8px;padding:7px 11px;backdrop-filter:blur(2px);box-shadow:0 2px 8px rgba(0,0,0,.06);color:#111827;}
.legend .ttl{font-family:"Sora";font-weight:600;font-size:12.5px;color:var(--accent);margin-bottom:2px}
.legend .row span.k{color:var(--txt-mut)}
.empty{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px;color:var(--txt-mut);text-align:center;padding:24px;z-index:7}
.empty .ico{font-size:40px;opacity:.4}
.empty .t{font-family:"Sora";font-weight:600;font-size:15px;color:var(--txt-dim)}
.empty .s{font-size:12px;max-width:380px}
.stats{display:flex;gap:0;border-top:1px solid var(--line);background:var(--panel-2);overflow-x:auto;flex:none}
.stat{padding:8px 16px;border-right:1px solid var(--line-soft);white-space:nowrap;min-width:auto}
.stat .k{font-size:9.5px;color:var(--txt-mut);text-transform:uppercase;letter-spacing:.5px}
.stat .v{font-family:"JetBrains Mono";font-weight:600;font-size:14px;color:var(--txt);margin-top:1px}
.stat .v.pos{color:var(--up)}.stat .v.neg{color:var(--down)}
@media(max-width:880px){aside{position:absolute;z-index:20;height:100%;box-shadow:4px 0 20px rgba(0,0,0,.12)}}
.menu-toggle{display:inline-flex;align-items:center;gap:6px;background:var(--topbar-soft);border:1px solid var(--topbar-soft);color:#fff;border-radius:20px;padding:7px 13px;cursor:pointer;font-family:"Sora";font-weight:600;font-size:11.5px}
.menu-toggle:hover{background:rgba(255,255,255,.2)}
aside.collapsed{display:none!important}
input[type=date]{width:100%;background:#fff;border:1px solid var(--line);color:var(--txt);border-radius:var(--radius-sm);padding:7px 8px;font-size:12px;font-family:inherit;outline:none}
input[type=date]:focus{border-color:var(--accent)}
input[type=date]::-webkit-calendar-picker-indicator{opacity:.6}
.subtabs{display:flex;gap:6px;margin-bottom:14px;background:var(--panel-2);padding:4px;border-radius:var(--radius-sm);border:1px solid var(--line)}
.subtabs button{flex:1;background:none;border:none;color:var(--txt-mut);font-family:"Sora";font-weight:600;font-size:11.5px;padding:7px;border-radius:5px;cursor:pointer}
.subtabs button.active{background:#fff;color:var(--accent);box-shadow:0 1px 3px rgba(0,0,0,.08)}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
/* stock card */
.stock-card{background:#fff;border:1px solid var(--line);border-radius:var(--radius-sm);padding:9px;margin-bottom:8px;position:relative;box-shadow:var(--shadow)}
.sc-top{display:flex;gap:6px;align-items:center}
.sc-top .sc-tk{flex:1.6;text-transform:uppercase}
.sc-top .sc-sh{flex:1}
#stockList.equal .sc-sh{display:none}
.sc-top input{padding:7px 8px;font-size:12px}
.sc-x{flex:none;width:28px;height:30px;background:#fff;border:1px solid var(--line);color:var(--txt-mut);border-radius:5px;cursor:pointer;font-size:13px}
.sc-x:hover{color:var(--down);border-color:var(--down)}
/* autocomplete */
.ac-drop{position:absolute;left:0;right:0;top:calc(100% + 2px);z-index:80;background:#fff;border:1px solid var(--line);border-radius:var(--radius-sm);box-shadow:0 6px 20px rgba(0,0,0,.10);max-height:190px;overflow-y:auto;display:none}
.ac-drop.open{display:block}
.ac-item{padding:7px 10px;cursor:pointer;font-size:12px;color:var(--txt);display:flex;justify-content:space-between;align-items:center;gap:6px}
.ac-item:hover,.ac-item.hi{background:var(--panel-2);color:var(--accent)}
.ac-sym{font-family:"JetBrains Mono";font-weight:600;font-size:11.5px}
.ac-name{font-size:10.5px;color:var(--txt-mut);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
/* shares table */
.shares-tbl{width:100%;border-collapse:collapse;margin-top:10px}
.shares-tbl th{font-size:10px;color:var(--txt-mut);text-align:left;font-weight:500;letter-spacing:.4px;padding:4px 6px;text-transform:uppercase}
.shares-tbl td{padding:3px 4px}
.shares-tbl td:first-child{font-family:"JetBrains Mono";font-size:11.5px;color:var(--txt)}
.shares-tbl input{padding:5px 7px;font-size:11.5px}
/* shape context menu */
#shapeMenu{position:fixed;z-index:300;background:#fff;border:1px solid var(--line);border-radius:10px;box-shadow:0 6px 24px rgba(0,0,0,.13);padding:10px 12px;display:none;min-width:200px}
#shapeMenu .sm-hd{font-size:10px;color:var(--txt-mut);font-weight:600;text-transform:uppercase;letter-spacing:.4px;margin-bottom:8px}
#shapeMenu .sm-colors{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:10px}
.sm-col{width:22px;height:22px;border-radius:50%;border:2px solid transparent;cursor:pointer;transition:.12s}
.sm-col:hover{transform:scale(1.18)}
.sm-col.picked{border-color:#111827}
#smDelete{width:100%;background:#fff;border:1px solid rgba(220,38,38,.35);color:#dc2626;border-radius:6px;padding:7px;font-size:12px;font-family:"Sora";font-weight:600;cursor:pointer}
#smDelete:hover{background:rgba(220,38,38,.06)}

/* ── TradingView-style command bar + controls (overhaul) ── */
.app{display:flex;flex-direction:column;height:100vh;min-height:0}
header.cmd{display:flex;align-items:center;gap:14px;padding:0 16px;height:56px;background:var(--topbar);box-shadow:0 2px 12px rgba(12,59,41,.18);position:relative;z-index:40;flex:none}
.cmd .brand{display:flex;align-items:baseline;gap:7px}
.cmd .brand .glyph{font-family:"Sora";font-weight:800;font-size:17px;letter-spacing:-.5px;color:#fff}
.cmd .brand .glyph::before{content:"◧ ";color:#5fe3a8}
.cmd .brand .brand-sub{font-size:12px;color:rgba(255,255,255,.6);font-weight:600}
.cmd-search{position:relative;flex:1;max-width:420px}
.cmd-search input{width:100%;background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.18);color:#fff;border-radius:10px;padding:9px 14px;font-size:13px;font-family:inherit;outline:none}
.cmd-search input::placeholder{color:rgba(255,255,255,.6)}
.cmd-search input:focus{background:rgba(255,255,255,.18);border-color:rgba(255,255,255,.4)}
#topAcDrop{position:absolute;left:0;right:0;top:calc(100% + 4px);z-index:90;background:#fff;border:1px solid var(--line);border-radius:11px;box-shadow:var(--shadow-lg);max-height:300px;overflow-y:auto;display:none}
#topAcDrop.open{display:block}
#topAcDrop .ac-item{padding:9px 13px;cursor:pointer;font-size:13px;color:var(--txt);display:flex;justify-content:space-between;gap:8px}
#topAcDrop .ac-item:hover,#topAcDrop .ac-item.hi{background:var(--panel-2);color:var(--accent)}
#topAcDrop .ac-sym{font-weight:700}#topAcDrop .ac-name{color:var(--txt-mut);font-size:11.5px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.cmd-actions{margin-left:auto;display:flex;align-items:center;gap:8px}
.cmd-btn{background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.18);color:#fff;border-radius:9px;padding:8px 13px;font-size:13px;font-weight:600;font-family:"Sora";cursor:pointer;white-space:nowrap}
.cmd-btn:hover{background:rgba(255,255,255,.22)}
.cmd-btn.solid{background:#16a86c;border-color:#16a86c}
.cmd-btn.solid:hover{background:#129a5f}
#saveStatus{font-size:11px;color:rgba(255,255,255,.7);min-width:0;white-space:nowrap}
.cmd #cloudAcct{display:flex;align-items:center;gap:7px;font-size:13px;color:#fff}
.cmd #cloudAcct img{width:26px;height:26px;border-radius:50%}
.cmd #cloudAcct .nm{font-weight:600;color:#fff;max-width:120px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.cmd #cloudAcct .lnk{font-size:12px;color:rgba(255,255,255,.7);cursor:pointer;text-decoration:underline}
.cmd #cloudAcct .gbtn{display:inline-flex;align-items:center;gap:6px;background:#fff;color:#1f2937;border:none;border-radius:9px;padding:8px 13px;font-size:13px;font-weight:600;text-decoration:none;cursor:pointer}
.controls{display:flex;align-items:center;gap:10px;flex-wrap:wrap;padding:10px 16px;background:var(--panel);border-bottom:1px solid var(--line);position:relative;z-index:30;flex:none}
.ctrl-name{width:200px;background:#fff;border:1px solid var(--line);border-radius:10px;padding:9px 12px;font-size:13px;font-weight:600;font-family:inherit;outline:none}
.ctrl-name:focus{border-color:var(--accent);box-shadow:0 0 0 2px rgba(15,123,90,.12)}
.controls .subtabs{display:flex;gap:4px;margin:0;background:var(--panel-2);padding:3px;border-radius:10px;border:1px solid var(--line)}
.controls .subtabs button{background:none;border:none;color:var(--txt-mut);font-family:"Sora";font-weight:600;font-size:12.5px;padding:6px 12px;border-radius:7px;cursor:pointer}
.controls .subtabs button.active{background:#fff;color:var(--accent);box-shadow:var(--shadow)}
.range{display:flex;gap:3px;background:var(--panel-2);padding:3px;border-radius:10px;border:1px solid var(--line)}
.range button{background:none;border:none;color:var(--txt-mut);font-family:"Sora";font-weight:600;font-size:12.5px;padding:6px 11px;border-radius:7px;cursor:pointer}
.range button.on{background:#fff;color:var(--accent);box-shadow:var(--shadow)}
.gear{background:#fff;border:1px solid var(--line);border-radius:10px;width:38px;height:38px;font-size:16px;cursor:pointer;color:var(--txt-dim)}
.gear:hover{border-color:var(--accent);color:var(--accent)}
.btn-build{background:var(--accent);color:#fff;border:none;border-radius:10px;padding:9px 22px;font-family:"Sora";font-weight:700;font-size:13px;cursor:pointer;box-shadow:0 2px 8px rgba(15,123,90,.25)}
.btn-build:hover{background:var(--accent-dim)}
.controls .hint{margin:0;font-size:11.5px}
.pop{position:absolute;top:calc(100% + 6px);left:16px;z-index:60;background:#fff;border:1px solid var(--line);border-radius:14px;box-shadow:var(--shadow-lg);padding:14px 16px;width:280px;display:none}
.pop.open{display:block}
.pop .fld{margin:10px 0 4px}.pop .fld:first-child{margin-top:0}
.chips{display:flex;align-items:center;gap:7px;padding:9px 16px;background:var(--panel);border-bottom:1px solid var(--line);overflow-x:auto;flex:none;min-height:44px}
.chips:empty::before{content:"Add stocks above, or load a ready-made index →";color:var(--txt-mut);font-size:12px}
.chip{display:inline-flex;align-items:center;gap:7px;background:var(--panel-2);border:1px solid var(--line);border-radius:20px;padding:6px 8px 6px 13px;font-size:12.5px;font-weight:600;color:var(--txt-dim);white-space:nowrap;box-shadow:var(--shadow)}
.chip .cx{display:inline-flex;align-items:center;justify-content:center;width:18px;height:18px;border-radius:50%;background:rgba(0,0,0,.06);color:var(--txt-mut);cursor:pointer;font-size:12px;border:none}
.chip .cx:hover{background:var(--down);color:#fff}
main{flex:1;display:flex;min-height:0}
/* chart-type segmented control in the controls strip */
.ctype{display:flex;gap:3px;background:var(--panel-2);padding:3px;border-radius:10px;border:1px solid var(--line)}
.ctype .tbtn{border:none;background:none;border-radius:7px;padding:6px 12px;margin:0;color:var(--txt-mut);font-family:"Sora";font-weight:600;font-size:12.5px}
.ctype .tbtn:hover{color:var(--accent)}
.ctype .tbtn.on{background:#fff;color:var(--accent);box-shadow:var(--shadow)}
.grid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px}
.grid3 .miniinp{width:100%}
/* left vertical toolbar */
.leftbar{flex:none;width:74px;background:var(--panel);border-right:1px solid var(--line);box-shadow:2px 0 12px rgba(16,40,30,.04);display:flex;flex-direction:column;gap:10px;padding:12px 8px;overflow-y:auto;z-index:10}
.lb-group{display:flex;flex-direction:column;gap:6px;padding-bottom:10px;border-bottom:1px solid var(--line-soft)}
.lb-group:last-child{border-bottom:none}
.lb-lbl{font-size:9px;color:var(--txt-mut);text-transform:uppercase;letter-spacing:.5px;text-align:center;font-weight:700;margin-bottom:1px}
.leftbar .tbtn{width:100%;margin:0;justify-content:center;padding:8px 4px;font-size:11px;font-weight:600;font-family:"Sora"}
.leftbar .tbtn.draw{padding:9px 4px}
.leftbar .tbtn.draw svg{width:16px;height:16px}
.lb-actions .tbtn{font-size:15px;padding:7px 4px}
</style>
</head>
<body>
<div class="app">
  <!-- ── COMMAND BAR (dark) ── -->
  <header class="cmd">
    <div class="brand"><span class="glyph">CHARTIX</span><span class="brand-sub">Index Builder</span></div>
    <div class="cmd-search">
      <input type="text" id="topSearch" placeholder="Add a stock to your index…" autocomplete="off">
      <div class="ac-drop" id="topAcDrop"></div>
    </div>
    <div class="cmd-actions">
      <button class="cmd-btn" id="btnReady">Ready-made ▾</button>
      <button class="cmd-btn" id="btnMine">My indices ▾</button>
      <button class="cmd-btn solid" id="btnSave">Save</button>
      <span id="saveStatus"></span>
      <div id="cloudAcct"></div>
      <span class="tagchip" id="srcChip" style="display:none">No data loaded</span>
    </div>
  </header>

  <!-- ── CONTROLS STRIP (light) ── -->
  <div class="controls">
    <input type="text" id="idxName" class="ctrl-name" value="My Custom Index" placeholder="Index name">
    <div class="subtabs" id="weightTabs">
      <button id="wMcap" class="active" onclick="setWeight('mcap')">Market-cap</button>
      <button id="wEqual" onclick="setWeight('equal')">Equal</button>
    </div>
    <div class="range" id="rangePresets">
      <button data-yrs="1">1Y</button><button data-yrs="2" class="on">2Y</button><button data-yrs="5">5Y</button><button data-yrs="10">Max</button>
    </div>
    <div class="ctype">
      <button class="tbtn on" id="btnArea" onclick="setChartType('area')">Area</button>
      <button class="tbtn" id="btnLine" onclick="setChartType('line')">Line</button>
      <button class="tbtn" id="btnCandle" onclick="setChartType('candle')">Candles</button>
    </div>
    <button class="gear" id="btnSettings" title="More settings">⚙</button>
    <button class="btn-build" onclick="fetchAndBuild()">Build →</button>
    <span id="fetchStatus" class="hint"></span>
    <!-- settings popover -->
    <div class="pop" id="settingsPop">
      <label class="fld">Exchange</label>
      <select id="exch"><option value=".NS">NSE (.NS)</option><option value=".BO">BSE (.BO)</option><option value="">US / as-typed</option></select>
      <label class="fld">Price field</label>
      <select id="priceField"><option value="close">Close (split-adj)</option><option value="adjclose">Adjusted close</option></select>
      <label class="fld">Index base value</label>
      <input type="number" id="baseValF" value="100" step="any">
      <label class="fld">Custom dates</label>

<script>
"use strict";

/* ── STATE ── */

  on:{sma1:false,sma2:false,ema:false,bb:false,rsi:false,macd:false,vol:false},

  document.getElementById('wEqual').classList.toggle('active',mode==='equal');

const D = { tool:'cursor', shapes:[], dragging:false, temp:null, selected:-1, editing:null, justEdited:false };

/* ── UI ── */
function showMsg(text,kind){const m=document.getElementById('msg');m.textContent=text;m.className='msg '+(kind||'ok');}
function clearMsg(){document.getElementById('msg').className='msg';}
document.getElementById('menuToggle').onclick=function(){

};

/* ── DATES / NUMBERS ── */
function pad(n){return n<10?'0'+n:''+n;}
function toKey(d){return d.getFullYear()+'-'+pad(d.getMonth()+1)+'-'+pad(d.getDate());}
function parseDate(v){
  if(v==null||v==='')return null;
  if(v instanceof Date&&!isNaN(v))return v;
  if(typeof v==='number'){if(v>20000&&v<80000)return new Date(Math.round((v-25569)*86400*1000));return null;}
  let s=String(v).trim(),m;
  m=s.match(/^(\d{4})-(\d{1,2})-(\d{1,2})/);if(m)return new Date(+m[1],+m[2]-1,+m[3]);
  if(/^\d{1,2}[-\s][A-Za-z]{3,}/.test(s)){const d=new Date(s);if(!isNaN(d))return d;}
  m=s.match(/^(\d{1,2})[\/\-](\d{1,2})[\/\-](\d{2,4})/);
  if(m){let yr=+m[3];if(yr<100)yr+=2000;return new Date(yr,+m[2]-1,+m[1]);}
  const d=new Date(s);return isNaN(d)?null:d;
}
function parseNum(v){
  if(v==null||v==='')return NaN;
  if(typeof v==='number')return v;
  return parseFloat(String(v).replace(/,/g,'').trim());
}

/* ── STOCK AUTOCOMPLETE ──
   Data comes from stocks.js (window.STOCK_LIST): [symbol, companyName, yahooSymbol].
   Falls back to a tiny built-in list if stocks.js is missing. */
const FALLBACK=[
  ['RELIANCE','Reliance Industries Ltd.','RELIANCE.NS'],['TCS','Tata Consultancy Services Ltd.','TCS.NS'],
  ['HDFCBANK','HDFC Bank Ltd.','HDFCBANK.NS'],['INFY','Infosys Ltd.','INFY.NS'],
  ['ICICIBANK','ICICI Bank Ltd.','ICICIBANK.NS'],['SBIN','State Bank of India','SBIN.NS'],
];
const STOCKS = (window.STOCK_LIST && window.STOCK_LIST.length) ? window.STOCK_LIST : FALLBACK;

function acSearch(q){
  if(!q||q.length<1)return[];
  const u=q.toUpperCase();
  const exact=[],starts=[],nameStarts=[],contains=[];
  for(const row of STOCKS){
    const sym=row[0], name=row[1];
    if(sym===u)exact.push(row);
    else if(sym.startsWith(u))starts.push(row);
    else if(name.toUpperCase().startsWith(u))nameStarts.push(row);
    else if(name.toUpperCase().includes(u))contains.push(row);
    if(exact.length+starts.length+nameStarts.length+contains.length>=60)break;
  }
  return [...exact,...starts,...nameStarts,...contains].slice(0,10);
}

function attachAC(inp,card){
  const drop=card.querySelector('.ac-drop');
  let hi=-1;
  function render(q){
    const res=acSearch(q);hi=-1;
    if(!res.length){drop.classList.remove('open');return;}
    drop.innerHTML=res.map(r=>`<div class="ac-item" data-yh="${r[2]}" data-sym="${r[0]}"><span class="ac-sym">${r[0]}</span><span class="ac-name">${r[1]}</span></div>`).join('');
    drop.querySelectorAll('.ac-item').forEach(el=>el.addEventListener('mousedown',e=>{e.preventDefault();pick(el.dataset.yh);}));
    drop.classList.add('open');
  }
  function pick(yh){inp.value=yh;drop.classList.remove('open');hi=-1;fetchShares(card,yh);}
  function close(){drop.classList.remove('open');hi=-1;}
  function highlight(){drop.querySelectorAll('.ac-item').forEach((el,i)=>el.classList.toggle('hi',i===hi));}
  inp.addEventListener('input',()=>render(inp.value));
  inp.addEventListener('keydown',e=>{
    const items=drop.querySelectorAll('.ac-item');
    if(e.key==='ArrowDown'){e.preventDefault();hi=Math.min(hi+1,items.length-1);highlight();}
    else if(e.key==='ArrowUp'){e.preventDefault();hi=Math.max(hi-1,-1);highlight();}
    else if(e.key==='Enter'&&hi>=0){e.preventDefault();pick(items[hi].dataset.yh);}
    else if(e.key==='Escape')close();
  });
  inp.addEventListener('blur',()=>setTimeout(close,160));
}

/* Auto-fill outstanding shares (in Crores) from the local server when a stock is picked.
   Only works in "Local price server" mode (Yahoo's shares API needs the crumb flow). */
async function fetchShares(card,yh){
  const shInp=card.querySelector('.sc-sh');
  if(!shInp)return;
  if(S.weightMode==='equal')return;
  if(document.getElementById('srcSel').value!=='local'){return;}
  const base=document.getElementById('serverUrl').value.replace(/\/+$/,'');
  const prevPh=shInp.placeholder; shInp.placeholder='fetching…'; shInp.value='';
  try{
    const res=await fetch(base+'/shares?symbol='+encodeURIComponent(yh));
    const j=await res.json();
    if(res.ok&&j.sharesCr){ shInp.value=Math.round(j.sharesCr*100)/100; shInp.placeholder=prevPh; }
    else { shInp.placeholder='Enter shares (Cr)'; }
  }catch(e){ shInp.placeholder='Enter shares (Cr)'; }
}

/* ── STOCK ROWS ── */
const MAX_STOCKS=15;
function updateStkCount(){
  const n=document.querySelectorAll('#stockList [data-row]').length;
  document.getElementById('stkCount').textContent='('+n+'/'+MAX_STOCKS+')';
  document.getElementById('addStockBtn').style.display=n>=MAX_STOCKS?'none':'flex';

    '<div class="sc-top">'+
      '<input class="sc-tk" placeholder="Enter stock name or symbol…" value="'+(tk||'')+'">'+
      '<input class="sc-sh" type="number" step="any" placeholder="Shares (Cr)" value="'+(sh!=null?sh:'')+'">'+
      '<button class="sc-x" onclick="this.closest(\'[data-row]\').remove();updateStkCount()">✕</button>'+
    '</div>'+
    '<div class="ac-drop"></div>';
  list.appendChild(card);
  attachAC(card.querySelector('.sc-tk'),card);

}
/* One-click demo so new visitors instantly see how it works. */
function loadSample(){

  if(S.weightMode==='equal'){addStockRow('RELIANCE');addStockRow('TCS');addStockRow('HDFCBANK');}
  else{addStockRow('RELIANCE',1353.25);addStockRow('TCS',361.7);addStockRow('HDFCBANK',765.0);}

/* ── FETCH ── */
function srcChange(){ /* data source is fixed to the same-origin Chartix API */ }
function ySym(raw){
  let s=String(raw||'').trim();if(!s)return'';
  const ex=document.getElementById('exch').value;
  if(s.includes(':')){const p=s.split(':');const pm={NSE:'.NS',BSE:'.BO',BOM:'.BO',NYSE:'',NASDAQ:''};return p[1].toUpperCase()+((p[0].toUpperCase()in pm)?pm[p[0].toUpperCase()]:ex);}
  if(s.includes('.'))return s.toUpperCase();
  return s.toUpperCase()+ex;
}
async function fetchSeries(sym,start,end,field){
  const src=document.getElementById('srcSel').value;
  if(src==='local'){
    const base=document.getElementById('serverUrl').value.replace(/\/+$/,'');
    const res=await fetch(base+'/history?symbol='+encodeURIComponent(sym)+'&start='+start+'&end='+end);
    if(!res.ok)throw new Error('server '+res.status);
    const j=await res.json();if(j.error)throw new Error(j.error);
    const ca=(field==='adjclose'&&j.adjclose)?j.adjclose:j.close;
    const close={},open={},high={},low={};
    (j.dates||[]).forEach((d,i)=>{
      if(ca[i]!=null&&!isNaN(ca[i]))close[d]=ca[i];
      if(j.open&&j.open[i]!=null)open[d]=j.open[i];
      if(j.high&&j.high[i]!=null)high[d]=j.high[i];
      if(j.low&&j.low[i]!=null)low[d]=j.low[i];
    });
    return{close,open,high,low};
  }else{
    const p1=Math.floor(new Date(start+'T00:00:00').getTime()/1000);
    const p2=Math.floor(new Date(end+'T23:59:59').getTime()/1000)+86400;
    const y='https://query1.finance.yahoo.com/v8/finance/chart/'+encodeURIComponent(sym)+'?interval=1d&period1='+p1+'&period2='+p2;
    const res=await fetch(document.getElementById('proxyUrl').value+encodeURIComponent(y));
    if(!res.ok)throw new Error('proxy '+res.status);
    const j=await res.json();const r=j?.chart?.result?.[0];if(!r)throw new Error('no data');
    const q=r.indicators.quote[0];const adjA=r.indicators.adjclose?.[0]?.adjclose||null;
    const ca=(field==='adjclose'&&adjA)?adjA:q.close||[];
    const close={},open={},high={},low={};
    (r.timestamp||[]).forEach((t,i)=>{
      const d=toKey(new Date(t*1000));
      if(ca[i]!=null)close[d]=ca[i];if(q.open?.[i]!=null)open[d]=q.open[i];
      if(q.high?.[i]!=null)high[d]=q.high[i];if(q.low?.[i]!=null)low[d]=q.low[i];
    });
    return{close,open,high,low};
  }
}
async function fetchAndBuild(){
  clearMsg();
  S.rs.data={};  // date range may change — invalidate cached benchmark series
  const status=document.getElementById('fetchStatus');
  const start=document.getElementById('gStart').value,end=document.getElementById('gEnd').value;
  const field=document.getElementById('priceField').value;
  const base=parseNum(document.getElementById('baseValF').value)||100;
  const name=document.getElementById('idxName').value.trim();
  if(!start||!end){showMsg('Pick a start and end date.','err');return;}
  if(start>=end){showMsg('Start must be before end.','err');return;}
  const equal=S.weightMode==='equal';
  const rows=[...document.querySelectorAll('#stockList [data-row]')];
  const stocks=[];
  rows.forEach(r=>{
    const tk=r.querySelector('.sc-tk').value.trim();
    const sh=parseNum(r.querySelector('.sc-sh').value);
    if(!tk)return;
    if(equal)stocks.push({display:tk.toUpperCase(),key:ySym(tk),sharesCr:1});
    else if(!isNaN(sh)&&sh>0)stocks.push({display:tk.toUpperCase(),key:ySym(tk),sharesCr:sh});
  });
  if(stocks.length<2){showMsg(equal?'Add at least 2 stocks.':'Add at least 2 stocks with shares.','err');return;}
  const priceMap={},failed=[];
  for(let i=0;i<stocks.length;i++){
    const s=stocks[i];status.textContent='Fetching '+s.key+' ('+(i+1)+'/'+stocks.length+')…';
    try{
      const m=await fetchSeries(s.key,start,end,field);
      if(!Object.keys(m.close).length)failed.push(s.display+' (empty)');else priceMap[s.key]=m;
    }catch(e){failed.push(s.display+' ('+e.message+')');}
    await new Promise(r=>setTimeout(r,260));
  }
  const good=stocks.filter(s=>priceMap[s.key]);
  if(good.length<2){showMsg('Too many fetch failures. Issues: '+failed.join(', '),'err');status.textContent='';return;}
  status.innerHTML=failed.length?'⚠ Skipped: '+failed.join(', '):'Fetched ✓';
  S.title=name||(good.length+'-Stock '+(equal?'Equal-Wt':'')+' Index');
  assembleAndBuild(good,priceMap,base,start,end,equal);
}
function assembleAndBuild(stocks,priceMap,baseVal,gStart,gEnd,equal){
  try{
    const set=new Set();
    stocks.forEach(s=>Object.keys(priceMap[s.key].close).forEach(d=>{if(d>=gStart&&d<=gEnd)set.add(d);}));
    const dates=[...set].sort();
    if(dates.length<2){showMsg('Not enough trading days.','err');return;}
    function ff(field){const out={};stocks.forEach(s=>{const m=priceMap[s.key][field]||{};let last=NaN;const a=[];for(const d of dates){if(m[d]!=null&&!isNaN(m[d]))last=m[d];a.push(last);}out[s.key]=a;});return out;}
    const C=ff('close'),O=ff('open'),H=ff('high'),L=ff('low');
    // Start at earliest date where ≥50% of stocks (min 2) have data — allows
    // recently-listed stocks to join later without truncating the whole history.
    const minSi=Math.max(2,Math.ceil(stocks.length/2));
    let si=-1;for(let i=0;i<dates.length;i++){if(stocks.filter(s=>!isNaN(C[s.key][i])).length>=minSi){si=i;break;}}
    if(si<0){showMsg('No date with full pricing found.','err');return;}
    const recs=[];

    if(equal){
      // Each stock normalized to its own first-available price so late joiners
      // enter at neutral (1.0) — no index-level jump on entry.
      const baseC={};stocks.forEach(s=>{const a=C[s.key];for(let j=0;j<a.length;j++){if(!isNaN(a[j])){baseC[s.key]=a[j];break;}}});
      function avg(F,i){let sum=0,cnt=0;stocks.forEach(s=>{const p=F[s.key][i],b=baseC[s.key];if(!isNaN(p)&&!isNaN(b)&&b>0){sum+=p/b;cnt++;}});return cnt?sum/cnt:NaN;}
      for(let i=si;i<dates.length;i++){
        const c=avg(C,i);if(isNaN(c))continue;
        const o=avg(O,i),h=avg(H,i),l=avg(L,i),ok=!isNaN(o)&&!isNaN(h)&&!isNaN(l);
        recs.push({key:dates[i],value:c*baseVal,o:ok?o*baseVal:NaN,h:ok?h*baseVal:NaN,l:ok?l*baseVal:NaN,c:c*baseVal});
      }
    }else{
      // Market-cap weight with divisor adjustment (Nifty / S&P methodology).
      // When a new stock enters the index, the divisor is recalculated so the
      // index level stays perfectly continuous — no jump on entry.
      function sumMC(F,i,keys){let t=0;stocks.forEach(s=>{if(keys&&!keys.has(s.key))return;const p=F[s.key][i];if(!isNaN(p)&&s.sharesCr>0)t+=p*s.sharesCr*1e7;});return t;}
      let bm=sumMC(C,si,null);
      if(bm<=0){showMsg('Base market cap is zero.','err');return;}
      let divisor=bm/baseVal,prevLevel=baseVal;
      let prevPresent=new Set(stocks.filter(s=>!isNaN(C[s.key][si])).map(s=>s.key));
      for(let i=si;i<dates.length;i++){
        const curPresent=new Set(stocks.filter(s=>!isNaN(C[s.key][i])).map(s=>s.key));
        const totMC=sumMC(C,i,null);
        if(totMC<=0){prevPresent=curPresent;continue;}
        // Divisor adjustment: any new joiner → recalc divisor so level is unchanged.
        if(i>si&&[...curPresent].some(k=>!prevPresent.has(k)))divisor=totMC/prevLevel;
        const level=totMC/divisor;
        const omc=sumMC(O,i,null),hmc=sumMC(H,i,null),lmc=sumMC(L,i,null),ok=omc>0&&hmc>0&&lmc>0;
        recs.push({key:dates[i],value:level,o:ok?omc/divisor:NaN,h:ok?hmc/divisor:NaN,l:ok?lmc/divisor:NaN,c:level});
        prevLevel=level;prevPresent=curPresent;
      }
    }
    finalizeData(recs,recs.some(r=>!isNaN(r.o)),false);
  }catch(e){showMsg('Build failed: '+e.message,'err');}
}

/* ── FINALIZE ── */
function finalizeData(recs,hasOHLC,hasVol){
  const map=new Map();
  for(const r of recs){if(isNaN(r.value)&&!(hasOHLC&&!isNaN(r.c)))continue;map.set(r.key,r);}
  const keys=[...map.keys()].sort();
  if(keys.length<2){showMsg('Need at least 2 data points.','err');return;}
  S.times=[];S.closes=[];S.ohlc=hasOHLC?[]:null;S.vol=hasVol?[]:null;
  for(const k of keys){
    const r=map.get(k);const cl=hasOHLC&&!isNaN(r.c)?r.c:r.value;if(isNaN(cl))continue;
    S.times.push(k);S.closes.push(cl);
    if(hasOHLC)S.ohlc.push({time:k,open:r.o,high:r.h,low:r.l,close:r.c});
  }
  if(!hasOHLC)S.ohlc=null;if(!S.vol?.length)S.vol=null;
  S.timeIdx={};S.times.forEach((t,i)=>S.timeIdx[t]=i);
  document.getElementById('btnCandle').style.opacity=S.ohlc?1:.4;
  document.getElementById('btnCandle').style.pointerEvents=S.ohlc?'auto':'none';
  document.getElementById('iVOL').style.opacity=S.vol?1:.4;
  document.getElementById('iVOL').style.pointerEvents=S.vol?'auto':'none';
  if(!S.ohlc&&S.chartType==='candle')S.chartType='area';
  document.getElementById('srcChip').textContent=S.title+' · '+S.times.length+' bars';
  document.getElementById('empty').style.display='none';
  document.getElementById('legend').style.display='block';
  document.getElementById('stats').style.display='flex';

/* ── INDICATORS ── */
function SMA(v,p){const o=Array(v.length).fill(null);let s=0;for(let i=0;i<v.length;i++){s+=v[i];if(i>=p)s-=v[i-p];if(i>=p-1)o[i]=s/p;}return o;}
function EMA(v,p){const o=Array(v.length).fill(null);const k=2/(p+1);let pr=null;for(let i=0;i<v.length;i++){if(i<p-1)continue;if(pr===null){let s=0;for(let j=i-p+1;j<=i;j++)s+=v[j];pr=s/p;o[i]=pr;}else{pr=v[i]*k+pr*(1-k);o[i]=pr;}}return o;}
function STD(v,p){const o=Array(v.length).fill(null);for(let i=p-1;i<v.length;i++){let m=0;for(let j=i-p+1;j<=i;j++)m+=v[j];m/=p;let s=0;for(let j=i-p+1;j<=i;j++){const d=v[j]-m;s+=d*d;}o[i]=Math.sqrt(s/p);}return o;}
function RSI(v,p){const o=Array(v.length).fill(null);if(v.length<=p)return o;let g=0,l=0;for(let i=1;i<=p;i++){const d=v[i]-v[i-1];d>=0?g+=d:l-=d;}let ag=g/p,al=l/p;o[p]=al===0?100:100-100/(1+ag/al);for(let i=p+1;i<v.length;i++){const d=v[i]-v[i-1];const gd=d>0?d:0,ld=d<0?-d:0;ag=(ag*(p-1)+gd)/p;al=(al*(p-1)+ld)/p;o[i]=al===0?100:100-100/(1+ag/al);}return o;}
function MACD(v,f,sl,sig){const ef=EMA(v,f),es=EMA(v,sl);const mc=v.map((_,i)=>(ef[i]!=null&&es[i]!=null)?ef[i]-es[i]:null);const idx=mc.map((x,i)=>x!=null?i:-1).filter(i=>i>=0);const sc=EMA(idx.map(i=>mc[i]),sig);const sg=Array(v.length).fill(null);idx.forEach((gi,k)=>{if(sc[k]!=null)sg[gi]=sc[k];});return{macd:mc,signal:sg,hist:v.map((_,i)=>(mc[i]!=null&&sg[i]!=null)?mc[i]-sg[i]:null)};}
function pack(arr){const o=[];for(let i=0;i<arr.length;i++){if(arr[i]!=null&&!isNaN(arr[i]))o.push({time:S.times[i],value:arr[i]});}return o;}
function toggleInd(k){if(k==='vol'&&!S.vol)return;S.on[k]=!S.on[k];const m={sma1:'iSMA1',sma2:'iSMA2',ema:'iEMA',bb:'iBB',rsi:'iRSI',macd:'iMACD',vol:'iVOL'};document.getElementById(m[k]).classList.toggle('on',S.on[k]);if(S.chart)refreshIndicators();}
async function toggleRS(sym){
  if(!S.times.length){showMsg('Build an index first, then compare.','err');return;}
  const key=sym==='^NSEI'?'n50':'n500';
  const btnId=sym==='^NSEI'?'iRS50':'iRS500';

      if(!r.ok)throw new Error('HTTP '+r.status);
      const j=await r.json();
      const map={};
      for(let i=0;i<(j.dates||[]).length;i++){if(j.close[i]!=null)map[j.dates[i]]=j.close[i];}
      if(!Object.keys(map).length)throw new Error('no data returned');

function fmt(n,d){if(n==null||isNaN(n))return'—';return Number(n).toLocaleString('en-IN',{minimumFractionDigits:d,maximumFractionDigits:d});}
function onCrosshair(param){
  const lg=document.getElementById('legend');

  else main=`<b style="color:#111827">${fmt(S.closes[idx],2)}</b>`;

  if(S.on.sma1)add('SMA '+document.getElementById('pSMA1').value,C.sma1,'#d97706');
  if(S.on.sma2)add('SMA '+document.getElementById('pSMA2').value,C.sma2,'#7c3aed');
  if(S.on.ema)add('EMA '+document.getElementById('pEMA').value,C.ema,'#0891b2');
  if(S.on.bb&&C.bbU){html+=`<div class="row"><span class="k" style="color:#64748b">BOLL 20</span> <b>${fmt(C.bbU[idx],2)} / ${fmt(C.bbM[idx],2)} / ${fmt(C.bbL[idx],2)}</b></div>`;}
  if(S.on.rsi)add('RSI 14',C.rsi,'#d97706');
  if(S.on.macd&&C.macd){html+=`<div class="row"><span class="k" style="color:#2d7d52">MACD</span> <b>${fmt(C.macd[idx],2)}</b> <span class="k" style="color:#d97706">sig</span> ${fmt(C.macdSig[idx],2)} <span class="k">hist</span> ${fmt(C.macdHist[idx],2)}</div>`;}
  if(S.on.vol&&C.vol)add('VOL',C.vol,'#2d7d52');
  if(S.rs.n50&&C['rs_^NSEI'])add('RS vs N50',C['rs_^NSEI'],'#7c3aed');

/* ── STATS ── */
function computeStats(){
  const v=S.closes,t=S.times,n=v.length;const first=v[0],last=v[n-1],tot=(last-first)/first;
  let hi=v[0],lo=v[0];for(let i=0;i<n;i++){if(v[i]>hi)hi=v[i];if(v[i]<lo)lo=v[i];}
  let peak=v[0],mdd=0;for(let i=0;i<n;i++){if(v[i]>peak)peak=v[i];const dd=(v[i]-peak)/peak;if(dd<mdd)mdd=dd;}
  const rets=[];for(let i=1;i<n;i++){if(v[i-1]>0)rets.push(Math.log(v[i]/v[i-1]));}
  const mn=rets.reduce((a,b)=>a+b,0)/(rets.length||1);let vr=0;rets.forEach(r=>vr+=(r-mn)*(r-mn));vr/=(rets.length||1);
  const vol=Math.sqrt(vr)*Math.sqrt(252);const yrs=(new Date(t[n-1])-new Date(t[0]))/86400000/365.25;
  const cagr=yrs>0?Math.pow(last/first,1/yrs)-1:null;
  const stats=[['Current',fmt(last,2),''],['Total Return',(tot>=0?'+':'')+fmt(tot*100,2)+'%',tot>=0?'pos':'neg'],
    cagr!=null?['CAGR',(cagr>=0?'+':'')+fmt(cagr*100,2)+'%',cagr>=0?'pos':'neg']:null,
    ['Ann. Vol',fmt(vol*100,2)+'%',''],['Max DD',fmt(mdd*100,2)+'%','neg'],
    ['ATH',fmt(hi,2),'pos'],['ATL',fmt(lo,2),'neg'],['Days',''+n,''],['Range',t[0]+' → '+t[n-1],'']].filter(Boolean);
  document.getElementById('stats').innerHTML=stats.map(s=>`<div class="stat"><div class="k">${s[0]}</div><div class="v ${s[2]}">${s[1]}</div></div>`).join('');
}

/* ── DRAWING ── */
const cv=document.getElementById('overlay');
function resizeOverlay(){
  const w=document.getElementById('chartWrap'),dpr=window.devicePixelRatio||1;
  cv.width=w.clientWidth*dpr;cv.height=w.clientHeight*dpr;
  cv.style.width=w.clientWidth+'px';cv.style.height=w.clientHeight+'px';
  cv.getContext('2d').setTransform(dpr,0,0,dpr,0,0);
}
window.addEventListener('resize',()=>{resizeOverlay();redrawOverlay();});
function px(pt){
  if(!S.chart||!S.main)return null;
  const x=S.chart.timeScale().logicalToCoordinate(pt.logical);
  const y=S.main.priceToCoordinate(pt.price);
  return(x==null||y==null)?null:{x,y};
}
function pricePaneH(){try{return S.chart.panes()[0].getHeight();}catch(e){return cv.clientHeight;}}
function redrawOverlay(){
  if(!S.chart||!S.main)return;
  const ctx=cv.getContext('2d');ctx.clearRect(0,0,cv.clientWidth,cv.clientHeight);
  const all=D.temp?[...D.shapes,D.temp]:D.shapes;
  all.forEach((sh,i)=>drawShape(ctx,sh,i===D.selected));
}
function drawShape(ctx,sh,sel){
  ctx.save();ctx.lineWidth=sel?2.5:1.5;
  if(sel){ctx.shadowColor='rgba(45,125,82,.35)';ctx.shadowBlur=8;}
  const col=sh.color||'#2d7d52';
  if(sh.type==='hline'){
    const y=S.main.priceToCoordinate(sh.a.price);if(y==null){ctx.restore();return;}
    ctx.strokeStyle=col;ctx.setLineDash([7,4]);ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(cv.clientWidth,y);ctx.stroke();ctx.setLineDash([]);
    lbl(ctx,cv.clientWidth-88,y,fmt(sh.a.price,2),col);
  }else if(sh.type==='trend'){
    const a=px(sh.a),b=sh.b&&px(sh.b);if(!a||!b){ctx.restore();return;}
    ctx.strokeStyle=col;ctx.beginPath();ctx.moveTo(a.x,a.y);ctx.lineTo(b.x,b.y);ctx.stroke();
    dot(ctx,a,col);dot(ctx,b,col);lbl(ctx,b.x+6,b.y,fmt(sh.b.price,2),col);
  }else if(sh.type==='rect'){
    const a=px(sh.a),b=sh.b&&px(sh.b);if(!a||!b){ctx.restore();return;}
    const x=Math.min(a.x,b.x),y=Math.min(a.y,b.y),w=Math.abs(b.x-a.x),h=Math.abs(b.y-a.y);
    ctx.fillStyle='rgba(45,125,82,.07)';ctx.fillRect(x,y,w,h);
    ctx.strokeStyle=col;ctx.setLineDash([4,3]);ctx.strokeRect(x,y,w,h);ctx.setLineDash([]);
    lbl(ctx,x+4,y-3,fmt(Math.max(sh.a.price,sh.b.price),2)+' / '+fmt(Math.min(sh.a.price,sh.b.price),2),'#374151');
  }else if(sh.type==='fib'){
    const a=px(sh.a),b=sh.b&&px(sh.b);if(!a||!b){ctx.restore();return;}
    const hi=Math.max(sh.a.price,sh.b.price),lo=Math.min(sh.a.price,sh.b.price);
    const x0=Math.min(a.x,b.x),x1=cv.clientWidth-60;
    const lvs=[[0,'#374151'],[.236,'#dc2626'],[.382,'#d97706'],[.5,'#2d7d52'],[.618,'#0891b2'],[.786,'#7c3aed'],[1,'#374151']];
    ctx.font='10px JetBrains Mono';
    lvs.forEach(([lv,c])=>{const p=hi-(hi-lo)*lv;const y=S.main.priceToCoordinate(p);if(y==null)return;ctx.strokeStyle=c;ctx.globalAlpha=.85;ctx.beginPath();ctx.moveTo(x0,y);ctx.lineTo(x1,y);ctx.stroke();ctx.globalAlpha=1;ctx.fillStyle=c;ctx.fillText((lv*100).toFixed(1)+'%  '+fmt(p,2),x0+4,y-3);});
    dot(ctx,a,col);dot(ctx,b,col);
  }
  ctx.restore();
}
function dot(ctx,p,col){ctx.fillStyle='#fff';ctx.strokeStyle=col;ctx.lineWidth=1.5;ctx.beginPath();ctx.arc(p.x,p.y,3.5,0,7);ctx.fill();ctx.stroke();}
function lbl(ctx,x,y,txt,col){ctx.font='10px JetBrains Mono';const w=ctx.measureText(txt).width+8;ctx.fillStyle='rgba(255,255,255,.93)';ctx.fillRect(x,y-9,w,14);ctx.fillStyle=col||'#111827';ctx.fillText(txt,x+4,y+1.5);}

/* ── HIT TESTING ── */
function dpt(a,b){return Math.hypot(a.x-b.x,a.y-b.y);}
function dseg(p,a,b){const dx=b.x-a.x,dy=b.y-a.y,l2=dx*dx+dy*dy;if(!l2)return dpt(p,a);const t=Math.max(0,Math.min(1,((p.x-a.x)*dx+(p.y-a.y)*dy)/l2));return dpt(p,{x:a.x+t*dx,y:a.y+t*dy});}
function hitTest(sh,x,y){
  if(!S.main)return false;
  if(sh.type==='hline'){const cy=S.main.priceToCoordinate(sh.a.price);return cy!=null&&Math.abs(y-cy)<9;}
  const a=px(sh.a),b=sh.b?px(sh.b):null;if(!a)return false;
  if(sh.type==='trend')return b&&dseg({x,y},a,b)<9;
  if(sh.type==='rect')return b&&x>=Math.min(a.x,b.x)&&x<=Math.max(a.x,b.x)&&y>=Math.min(a.y,b.y)&&y<=Math.max(a.y,b.y);
  if(sh.type==='fib')return b&&(dpt({x,y},a)<14||dpt({x,y},b)<14);
  return false;
}

/* ── SHAPE MENU ── */
const COLS=['#2d7d52','#dc2626','#d97706','#0891b2','#7c3aed','#db2777','#374151','#ea580c'];
(function(){
  const sc=document.getElementById('smColors');
  COLS.forEach(c=>{
    const b=document.createElement('button');b.className='sm-col';b.style.background=c;b.title=c;
    b.onclick=()=>{if(D.selected>=0){D.shapes[D.selected].color=c;sc.querySelectorAll('.sm-col').forEach(x=>x.classList.toggle('picked',x===b));redrawOverlay();}};
    sc.appendChild(b);
  });
  document.getElementById('smDelete').onclick=()=>{if(D.selected>=0){D.shapes.splice(D.selected,1);D.selected=-1;hideMenu();redrawOverlay();}};
})();
function showMenu(idx,cx,cy){
  D.selected=idx;redrawOverlay();
  const m=document.getElementById('shapeMenu');m.style.display='block';
  // highlight current color
  const cur=D.shapes[idx]?.color;
  m.querySelectorAll('.sm-col').forEach(b=>b.classList.toggle('picked',b.style.background===cur||b.title===cur));
  m.style.left=Math.min(cx+6,window.innerWidth-210)+'px';
  m.style.top=Math.min(cy+6,window.innerHeight-120)+'px';
}
function hideMenu(){D.selected=-1;document.getElementById('shapeMenu').style.display='none';redrawOverlay();}
document.addEventListener('keydown',e=>{if(e.key==='Escape')hideMenu();});
document.addEventListener('mousedown',e=>{if(!document.getElementById('shapeMenu').contains(e.target)&&e.target.id!=='overlay')hideMenu();});

/* ── CHART WRAP CLICK (cursor mode hit test) ── */
// Show a grab/move cursor when hovering an editable shape (cursor mode only).
document.getElementById('chartWrap').addEventListener('mousemove',e=>{
  if(D.editing){document.getElementById('chartWrap').style.cursor='grabbing';return;}
  if(D.tool!=='cursor'||!S.chart||!S.main){document.getElementById('chartWrap').style.cursor='';return;}
  const rect=document.getElementById('chartWrap').getBoundingClientRect();
  const h=hitHandle(e.clientX-rect.left,e.clientY-rect.top);
  document.getElementById('chartWrap').style.cursor=h?(h.which==='move'?'move':'grab'):'';
});
document.getElementById('chartWrap').addEventListener('click',e=>{
  if(D.tool!=='cursor'||!S.chart||!S.main)return;
  if(D.justEdited){D.justEdited=false;return;} // a readjust drag just happened — don't open the menu
  const rect=document.getElementById('chartWrap').getBoundingClientRect();
  const x=e.clientX-rect.left,y=e.clientY-rect.top;
  const idx=D.shapes.findIndex(sh=>hitTest(sh,x,y));
  if(idx>=0)showMenu(idx,e.clientX,e.clientY);
  else hideMenu();
});

/* ── OVERLAY MOUSE (drawing mode) ── */
function evtPt(e){
  const r=cv.getBoundingClientRect();const x=e.clientX-r.left,y=e.clientY-r.top;
  return{x,y,logical:S.chart.timeScale().coordinateToLogical(x),price:S.main.coordinateToPrice(y)};
}
/* Detect whether the cursor is over a draggable handle/body of an existing shape,
   so already-drawn shapes (trend lines, zones, fib, S/R) can be readjusted. */
function hitHandle(x,y){
  if(!S.main)return null;
  for(let i=D.shapes.length-1;i>=0;i--){
    const sh=D.shapes[i];
    if(sh.type==='hline'){
      const cy=S.main.priceToCoordinate(sh.a.price);
      if(cy!=null&&Math.abs(y-cy)<8)return{idx:i,which:'line'};
    }else if(sh.a&&sh.b){
      const a=px(sh.a),b=px(sh.b);
      if(a&&Math.hypot(x-a.x,y-a.y)<13)return{idx:i,which:'a'};
      if(b&&Math.hypot(x-b.x,y-b.y)<13)return{idx:i,which:'b'};
      if(hitTest(sh,x,y))return{idx:i,which:'move'};
    }
  }
  return null;
}
/* In cursor mode, grabbing a handle/body starts an edit-drag. We flip the overlay
   to capture mouse moves so the chart itself doesn't pan while you readjust. */
document.getElementById('chartWrap').addEventListener('mousedown',e=>{
  if(D.tool!=='cursor'||!S.chart||!S.main)return;
  const rect=document.getElementById('chartWrap').getBoundingClientRect();
  const x=e.clientX-rect.left,y=e.clientY-rect.top;
  const h=hitHandle(x,y);
  if(h){
    D.editing={idx:h.idx,which:h.which,last:null};
    D.justEdited=false;D.selected=h.idx;
    cv.style.pointerEvents='auto';
    e.preventDefault();
    redrawOverlay();
  }
});
cv.addEventListener('mousedown',e=>{
  if(D.tool==='cursor'||!S.chart||!S.main)return;
  const p=evtPt(e);if(p.logical==null||p.price==null)return;
  if(p.y>pricePaneH())return;
  if(D.tool==='hline'){D.shapes.push({type:'hline',a:{logical:0,price:p.price},b:null,color:'#dc2626'});redrawOverlay();setTool('cursor');return;}
  D.dragging=true;
  D.temp={type:D.tool,a:{logical:p.logical,price:p.price},b:{logical:p.logical,price:p.price},
    color:D.tool==='fib'?'#d97706':'#2d7d52'};
});
cv.addEventListener('mousemove',e=>{
  // Edit-drag of an existing shape (readjust endpoints / move / drag S-R line)
  if(D.editing){
    const sh=D.shapes[D.editing.idx];if(!sh)return;
    const p=evtPt(e);if(p.price==null)return;
    D.justEdited=true;
    if(D.editing.which==='line'){sh.a.price=p.price;}
    else if(D.editing.which==='a'){if(p.logical!=null)sh.a={logical:p.logical,price:p.price};}
    else if(D.editing.which==='b'){if(p.logical!=null)sh.b={logical:p.logical,price:p.price};}
    else if(D.editing.which==='move'){
      if(D.editing.last&&p.logical!=null){
        const dl=p.logical-D.editing.last.logical,dp=p.price-D.editing.last.price;
        sh.a.logical+=dl;sh.a.price+=dp;sh.b.logical+=dl;sh.b.price+=dp;
      }
      D.editing.last={logical:p.logical,price:p.price};
    }
    redrawOverlay();return;
  }
  if(!D.dragging||!D.temp)return;
  const p=evtPt(e);if(p.logical==null||p.price==null)return;
  D.temp.b={logical:p.logical,price:p.price};redrawOverlay();
});
window.addEventListener('mouseup',()=>{
  if(D.editing){D.editing=null;cv.style.pointerEvents=(D.tool==='cursor')?'none':'auto';redrawOverlay();return;}
  if(D.dragging&&D.temp){D.shapes.push(D.temp);D.temp=null;D.dragging=false;redrawOverlay();setTool('cursor');}
});

function setTool(t){
  D.tool=t;
  ['cursor','trend','hline','rect','fib'].forEach(x=>{const b=document.getElementById('d'+x[0].toUpperCase()+x.slice(1));if(b)b.classList.toggle('on',x===t);});
  // cursor mode: pointer-events none on overlay so chart can pan; click handled on chartWrap
  cv.style.pointerEvents=(t==='cursor')?'none':'auto';
  cv.style.cursor=(t==='cursor')?'default':'crosshair';
}
function undoDraw(){if(D.shapes.length){D.shapes.pop();D.selected=-1;hideMenu();redrawOverlay();}}
function clearDraw(){D.shapes=[];D.temp=null;D.selected=-1;hideMenu();redrawOverlay();}

/* ── EXPORT ── */
function exportPNG(){
  if(!S.chart)return;
  try{
    const base=S.chart.takeScreenshot(),out=document.createElement('canvas');
    out.width=base.width;out.height=base.height;const ctx=out.getContext('2d');ctx.drawImage(base,0,0);
    const sx=base.width/cv.clientWidth,sy=base.height/cv.clientHeight;
    ctx.drawImage(cv,0,0,cv.width,cv.height,0,0,cv.clientWidth*sx,cv.clientHeight*sy);
    // Chartix watermark — centered diagonal + corner tag, so shared images advertise the site.
    ctx.save();
    ctx.translate(out.width/2,out.height/2);ctx.rotate(-18*Math.PI/180);
    ctx.font='700 '+Math.round(out.width/14)+'px Sora, sans-serif';
    ctx.fillStyle='rgba(45,125,82,0.10)';ctx.textAlign='center';ctx.textBaseline='middle';
    ctx.fillText('chartix.in',0,0);ctx.restore();
    ctx.save();
    ctx.font='700 '+Math.round(out.width/55)+'px Sora, sans-serif';
    ctx.fillStyle='rgba(45,125,82,0.55)';ctx.textAlign='right';ctx.textBaseline='bottom';
    ctx.fillText('chartix.in',out.width-16,out.height-12);ctx.restore();
    const a=document.createElement('a');a.download='chartix_'+(S.title.replace(/[^\w]+/g,'_')||'index')+'.png';a.href=out.toDataURL('image/png');a.click();
  }catch(e){console.error(e);}
}

/* ── INIT ── */
new ResizeObserver(()=>{resizeOverlay();redrawOverlay();}).observe(document.getElementById('chartWrap'));
(function(){
  const today=new Date(),back=new Date();back.setFullYear(today.getFullYear()-2);
  document.getElementById('gStart').value=toKey(back);
  document.getElementById('gEnd').value=toKey(today);
  // Chips start empty — users add stocks from the top search bar.
  srcChange();
})();
</script>

<!-- ──────────────────────────────────────────────────────────────────────
     CHARTIX CLOUD: login, ready-made indices, save & autosave (Phase 1)
     Self-contained module. Talks to same-origin Next.js APIs:
       /api/auth/session, /api/index-builder/indices[/id]
     and loads /index-builder-app/data/sectorIndices.json
─────────────────────────────────────────────────────────────────────── -->
<style>
  #cloudBox{border:1px solid var(--line,#e4e7ea);border-radius:12px;padding:10px;margin:0 0 12px;background:rgba(45,125,82,.04)}
  #cloudAcct{display:flex;align-items:center;gap:8px;font-size:13px;min-height:30px}
  #cloudAcct img{width:26px;height:26px;border-radius:50%}
  #cloudAcct .nm{font-weight:600;color:var(--txt,#1a2b22);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  #cloudAcct .gbtn{margin-left:auto;display:inline-flex;align-items:center;gap:6px;border:1px solid #dadce0;background:#fff;border-radius:8px;padding:6px 12px;font-size:13px;font-weight:600;cursor:pointer;color:#3c4043;text-decoration:none}
  #cloudAcct .lnk{margin-left:auto;font-size:12px;color:var(--txt-mut,#6b7280);cursor:pointer;text-decoration:underline}
  #cloudBtns{display:flex;gap:6px;margin-top:8px}
  #cloudBtns .btn{flex:1;font-size:12.5px;padding:7px 6px}
  #saveStatus{font-size:11px;color:var(--txt-mut,#6b7280);margin-top:6px;min-height:14px}
  .cloud-modal{position:fixed;inset:0;z-index:9999;background:rgba(0,0,0,.45);display:none;align-items:center;justify-content:center;padding:16px}
  .cloud-modal.open{display:flex}
  .cloud-card{background:#fff;border-radius:16px;width:100%;max-width:560px;max-height:84vh;display:flex;flex-direction:column;overflow:hidden;box-shadow:0 20px 60px rgba(0,0,0,.25)}
  .cloud-head{display:flex;align-items:center;justify-content:space-between;padding:14px 18px;border-bottom:1px solid #eef0f2}
  .cloud-head h3{margin:0;font-size:16px;font-weight:700;color:#0f3d2a}
  .cloud-head .x{border:none;background:none;font-size:20px;cursor:pointer;color:#888;line-height:1}
  .cloud-tools{display:flex;gap:8px;padding:12px 18px;border-bottom:1px solid #f1f3f4;flex-wrap:wrap}
  .cloud-tools input,.cloud-tools select{border:1px solid #dadce0;border-radius:8px;padding:7px 10px;font-size:13px}
  .cloud-tools input{flex:1;min-width:140px}
  .cloud-body{overflow-y:auto;padding:12px 18px}
  .ix-card{display:flex;align-items:flex-start;gap:10px;border:1px solid #eef0f2;border-radius:10px;padding:11px 12px;margin-bottom:8px}
  .ix-card .meta{flex:1;min-width:0}
  .ix-card .nm{font-weight:600;font-size:14px;color:#1a2b22}
  .ix-card .ds{font-size:12px;color:#6b7280;margin-top:1px}
  .ix-card .ct{font-size:11px;color:#2d7d52;font-weight:600;margin-top:3px}
  .ix-card .acts{display:flex;gap:5px;flex-wrap:wrap;justify-content:flex-end}
  .ix-card .mini{border:1px solid #dadce0;background:#fff;border-radius:7px;padding:5px 9px;font-size:12px;cursor:pointer;color:#3c4043}
  .ix-card .mini.primary{background:#2d7d52;color:#fff;border-color:#2d7d52}
  .ix-card .mini.danger{color:#c0392b;border-color:#f0c5c0}
  .cloud-empty{text-align:center;color:#9aa0a6;font-size:13px;padding:28px 10px}
</style>
<div class="cloud-modal" id="rmModal"><div class="cloud-card">
  <div class="cloud-head"><h3>Ready-made indices</h3><button class="x" data-close>×</button></div>
  <div class="cloud-tools">
    <input type="text" id="rmSearch" placeholder="Search indices…">
    <select id="rmCat"><option value="">All categories</option></select>
  </div>
  <div class="cloud-body" id="rmList"></div>
</div></div>
<div class="cloud-modal" id="myModal"><div class="cloud-card">
  <div class="cloud-head"><h3>My indices</h3><button class="x" data-close>×</button></div>
  <div class="cloud-body" id="myList"></div>
</div></div>

<script>
(function(){
  var TOOL_URL='/index-builder-app/index.html';
  var session=null, currentId=null, currentShareId=null, dirty=false, lastSaveText='';

  function api(path,opts){ return fetch(path,Object.assign({credentials:'same-origin',headers:{'Content-Type':'application/json'}},opts||{})); }
  function esc(s){return String(s==null?'':s).replace(/[&<>"]/g,function(c){return{'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c];});}
  function setStatus(t){ lastSaveText=t; var el=document.getElementById('saveStatus'); if(el)el.textContent=t; }

  // ── current builder state ↔ saved-index shape ──
  function mapWeightToApi(){ return S.weightMode==='equal'?'EQUAL':'MARKET_CAP'; }
  function getState(){
    var rows=[].slice.call(document.querySelectorAll('#stockList [data-row]'));
    var constituents=[], customWeights={};
    rows.forEach(function(r){
      var tk=r.querySelector('.sc-tk').value.trim().toUpperCase();
      if(!tk)return;
      constituents.push(tk);
      var sh=parseFloat((r.querySelector('.sc-sh').value||'').replace(/,/g,''));
      if(!isNaN(sh)&&sh>0)customWeights[tk]=sh;
    });
    return {
      name:(document.getElementById('idxName').value.trim()||'Untitled index'),
      weightingType:mapWeightToApi(),
      constituents:constituents,
      customWeights:Object.keys(customWeights).length?customWeights:null,
      description:null
    };
  }
  function applyState(ix){
    document.getElementById('idxName').value=ix.name||'';
    setWeight(ix.weightingType==='EQUAL'?'equal':'mcap');
    var list=document.getElementById('stockList'); list.innerHTML='';
    var cw=ix.customWeights||{};
    (ix.constituents||[]).forEach(function(sym){ addStockRow(sym, cw[sym]!=null?cw[sym]:undefined); });
    if(!(ix.constituents||[]).length){ addStockRow(); addStockRow(); }
    updateStkCount();
  }

  // ── auth ──
  function loginHref(){ return '/sign-in?next='+encodeURIComponent(TOOL_URL); }
  function renderAccount(){
    var el=document.getElementById('cloudAcct'); if(!el)return;
    if(session&&session.user){
      var u=session.user;
      el.innerHTML=(u.image?'<img src="'+esc(u.image)+'" alt="">':'')+
        '<span class="nm">'+esc(u.name||u.email||'You')+'</span>'+
        '<span class="lnk" id="logoutLnk">Logout</span>';
      var lo=document.getElementById('logoutLnk'); if(lo)lo.onclick=function(){ window.location.href='/api/auth/signout?callbackUrl='+encodeURIComponent(TOOL_URL); };
    } else {
      el.innerHTML='<span style="color:var(--txt-mut,#6b7280)">Save your work — sign in</span>'+
        '<a class="gbtn" href="'+loginHref()+'">Continue with Google</a>';
    }
  }
  function requireLogin(){ if(session&&session.user)return true; window.location.href=loginHref(); return false; }

  // ── save / autosave ──
  function markDirty(){ dirty=true; }
  async function doSave(forceNew){
    if(!(session&&session.user))return false;
    var st=getState();
    if(st.constituents.length<1){ return false; }
    try{
      var res, payload;
      if(forceNew||!currentId){
        res=await api('/api/index-builder/indices',{method:'POST',body:JSON.stringify(st)});
      } else {
        res=await api('/api/index-builder/indices/'+currentId,{method:'PATCH',body:JSON.stringify(st)});
      }
      if(res.status===401){ setStatus('Sign in to save'); return false; }
      payload=await res.json();
      if(!res.ok||!payload.success){ setStatus(payload&&payload.error?payload.error.message:'Save failed'); return false; }
      currentId=payload.data.id; currentShareId=payload.data.shareId;
      dirty=false; setStatus('Saved just now');
      return true;
    }catch(e){ setStatus('Save failed — check connection'); return false; }
  }
  // periodic + debounced autosave
  setInterval(function(){ if(dirty&&session&&session.user&&currentId)doSave(false); },30000);
  var debTimer=null;
  function scheduleAutosave(){ markDirty(); if(!(session&&session.user))return; clearTimeout(debTimer); debTimer=setTimeout(function(){ if(currentId)doSave(false); },2500); }

  // ── ready-made modal ──
  var readyMade=null;
  async function openReadyMade(){
    var m=document.getElementById('rmModal'); m.classList.add('open');
    if(!readyMade){
      try{ var r=await fetch('/index-builder-app/data/sectorIndices.json'); readyMade=await r.json(); }
      catch(e){ document.getElementById('rmList').innerHTML='<div class="cloud-empty">Could not load ready-made indices.</div>'; return; }
      var cats=[]; Object.keys(readyMade).forEach(function(k){ var c=readyMade[k].category; if(cats.indexOf(c)<0)cats.push(c); });
      cats.sort(); var sel=document.getElementById('rmCat');
      cats.forEach(function(c){ var o=document.createElement('option'); o.value=c; o.textContent=c; sel.appendChild(o); });
    }
    renderReadyMade();
  }
  function renderReadyMade(){
    var q=(document.getElementById('rmSearch').value||'').toLowerCase();
    var cat=document.getElementById('rmCat').value;
    var list=document.getElementById('rmList'); var html='';
    Object.keys(readyMade).forEach(function(k){
      var x=readyMade[k];
      if(cat&&x.category!==cat)return;
      if(q&&x.name.toLowerCase().indexOf(q)<0&&x.description.toLowerCase().indexOf(q)<0)return;
      html+='<div class="ix-card"><div class="meta"><div class="nm">'+esc(x.name)+'</div>'+
        '<div class="ds">'+esc(x.description)+'</div>'+
        '<div class="ct">'+esc(x.category)+' · '+x.constituents.length+' stocks</div></div>'+
        '<div class="acts"><button class="mini primary" data-rm="'+esc(k)+'">Load</button></div></div>';
    });
    list.innerHTML=html||'<div class="cloud-empty">No indices match.</div>';
    list.querySelectorAll('[data-rm]').forEach(function(b){ b.onclick=function(){ loadReadyMade(readyMade[b.getAttribute('data-rm')]); }; });
  }
  function loadReadyMade(x){
    // Ready-made templates load market-cap weighted by default (like real
    // indices) — shares auto-fetch from Yahoo. Equal weight is one toggle away.
    // Saving creates the user's OWN copy — the template is never modified.
    currentId=null; currentShareId=null;
    document.getElementById('idxName').value=x.name||'';
    setWeight('mcap');
    var list=document.getElementById('stockList'); list.innerHTML='';
    x.constituents.forEach(function(sym){ addStockRow(sym); });
    // auto-fetch outstanding shares for each constituent (market-cap weighting)
    [].slice.call(document.querySelectorAll('#stockList [data-row]')).forEach(function(card){
      var tk=(card.querySelector('.sc-tk').value||'').trim();
      if(tk && typeof fetchShares==='function'){ try{ fetchShares(card, (typeof ySym==='function'?ySym(tk):tk)); }catch(e){} }
    });
    if(typeof updateStkCount==='function')updateStkCount();
    renderChips();
    document.getElementById('rmModal').classList.remove('open');
    setStatus(session&&session.user?'Loaded (market-cap) — Save to keep your copy':'Loaded — sign in to save');
    markDirty();
  }

  // ── my indices modal ──
  async function openMyIndices(){
    if(!requireLogin())return;
    var m=document.getElementById('myModal'); m.classList.add('open');
    var list=document.getElementById('myList'); list.innerHTML='<div class="cloud-empty">Loading…</div>';
    try{
      var res=await api('/api/index-builder/indices'); var p=await res.json();
      if(!res.ok||!p.success){ list.innerHTML='<div class="cloud-empty">Could not load.</div>'; return; }
      if(!p.data.length){ list.innerHTML='<div class="cloud-empty">No saved indices yet. Build one and hit Save.</div>'; return; }
      list.innerHTML=p.data.map(function(ix){
        return '<div class="ix-card" data-id="'+esc(ix.id)+'"><div class="meta">'+
          '<div class="nm">'+esc(ix.name)+'</div>'+
          '<div class="ct">'+(ix.weightingType==='EQUAL'?'Equal weight':'Market cap')+' · '+ix.constituents.length+' stocks'+(ix.visibility==='PUBLIC'?' · Public':'')+'</div></div>'+
          '<div class="acts">'+
            '<button class="mini primary" data-act="load">Load</button>'+
            '<button class="mini" data-act="rename">Rename</button>'+
            '<button class="mini" data-act="dup">Duplicate</button>'+
            '<button class="mini danger" data-act="del">Delete</button>'+
          '</div></div>';
      }).join('');
      var byId={}; p.data.forEach(function(ix){byId[ix.id]=ix;});
      list.querySelectorAll('.ix-card').forEach(function(card){
        var id=card.getAttribute('data-id'); var ix=byId[id];
        card.querySelector('[data-act=load]').onclick=function(){ currentId=ix.id; currentShareId=ix.shareId; applyState(ix); document.getElementById('myModal').classList.remove('open'); setStatus('Loaded "'+ix.name+'"'); dirty=false; };
        card.querySelector('[data-act=rename]').onclick=async function(){ var nn=prompt('Rename index',ix.name); if(!nn)return; await api('/api/index-builder/indices/'+id,{method:'PATCH',body:JSON.stringify({name:nn.trim()})}); openMyIndices(); };
        card.querySelector('[data-act=dup]').onclick=async function(){ await api('/api/index-builder/indices',{method:'POST',body:JSON.stringify({name:ix.name+' (copy)',weightingType:ix.weightingType,constituents:ix.constituents,customWeights:ix.customWeights,description:ix.description})}); openMyIndices(); };
        card.querySelector('[data-act=del]').onclick=async function(){ if(!confirm('Delete "'+ix.name+'"?'))return; await api('/api/index-builder/indices/'+id,{method:'DELETE'}); if(currentId===id){currentId=null;currentShareId=null;} openMyIndices(); };
      });
    }catch(e){ list.innerHTML='<div class="cloud-empty">Could not load.</div>'; }
  }

  // ── inject the cloud UI into the Build pane ──
  // ── constituent chips (visible mirror of the hidden #stockList rows) ──
  function renderChips(){
    var strip=document.getElementById('chipStrip'); if(!strip)return;
    var rows=[].slice.call(document.querySelectorAll('#stockList [data-row]'));
    strip.innerHTML='';
    rows.forEach(function(r,i){
      var tk=(r.querySelector('.sc-tk').value||'').trim().toUpperCase();
      if(!tk)return;
      var chip=document.createElement('span'); chip.className='chip';
      chip.innerHTML=esc(tk)+'<button class="cx" title="Remove">×</button>';
      chip.querySelector('.cx').onclick=function(){ r.remove(); if(typeof updateStkCount==='function')updateStkCount(); renderChips(); scheduleAutosave(); };
      strip.appendChild(chip);
    });
  }
  // add a stock (from the top search) → hidden row + chip; auto-fetch shares for market-cap
  function addStock(sym){
    sym=(sym||'').trim().toUpperCase(); if(!sym)return;
    var existing=[].slice.call(document.querySelectorAll('#stockList .sc-tk')).map(function(i){return (i.value||'').trim().toUpperCase();});
    if(existing.indexOf(sym)>=0)return; // no duplicates
    addStockRow(sym);
    var card=document.querySelector('#stockList [data-row]:last-child');
    if(card&&S.weightMode!=='equal'&&typeof fetchShares==='function'){ try{ fetchShares(card, (typeof ySym==='function'?ySym(sym):sym)); }catch(e){} }
    renderChips();
  }
  // ── top search autocomplete ──
  function initTopSearch(){
    var inp=document.getElementById('topSearch'), drop=document.getElementById('topAcDrop'); if(!inp)return;
    var hi=-1;
    function render(q){
      var res=(typeof acSearch==='function')?acSearch(q):[]; hi=-1;
      if(!res.length){drop.classList.remove('open');return;}
      drop.innerHTML=res.map(function(r){return '<div class="ac-item" data-sym="'+esc(r[0])+'"><span class="ac-sym">'+esc(r[0])+'</span><span class="ac-name">'+esc(r[1])+'</span></div>';}).join('');
      drop.querySelectorAll('.ac-item').forEach(function(el){ el.addEventListener('mousedown',function(e){e.preventDefault();pick(el.dataset.sym);}); });
      drop.classList.add('open');
    }
    function pick(sym){ addStock(sym); inp.value=''; drop.classList.remove('open'); inp.focus(); }
    inp.addEventListener('input',function(){render(inp.value);});
    inp.addEventListener('keydown',function(e){
      var items=drop.querySelectorAll('.ac-item');
      if(e.key==='ArrowDown'){e.preventDefault();hi=Math.min(hi+1,items.length-1);items.forEach(function(el,i){el.classList.toggle('hi',i===hi);});}
      else if(e.key==='ArrowUp'){e.preventDefault();hi=Math.max(hi-1,-1);items.forEach(function(el,i){el.classList.toggle('hi',i===hi);});}
      else if(e.key==='Enter'){e.preventDefault();if(hi>=0)pick(items[hi].dataset.sym);else if(items.length===1)pick(items[0].dataset.sym);}
      else if(e.key==='Escape')drop.classList.remove('open');
    });
    inp.addEventListener('blur',function(){setTimeout(function(){drop.classList.remove('open');},160);});
  }
  // ── date-range presets ──
  function initRange(){
    var box=document.getElementById('rangePresets'); if(!box)return;
    box.querySelectorAll('button').forEach(function(b){
      b.onclick=function(){
        box.querySelectorAll('button').forEach(function(x){x.classList.remove('on');}); b.classList.add('on');
        var yrs=parseInt(b.getAttribute('data-yrs'),10)||2;
        var end=new Date(), start=new Date(); start.setFullYear(end.getFullYear()-yrs);
        if(typeof toKey==='function'){ document.getElementById('gStart').value=toKey(start); document.getElementById('gEnd').value=toKey(end); }
        scheduleAutosave();
      };
    });
  }
  // ── settings popover ──
  function initSettings(){
    var btn=document.getElementById('btnSettings'), pop=document.getElementById('settingsPop'); if(!btn)return;
    btn.onclick=function(e){ e.stopPropagation(); pop.classList.toggle('open'); };
    document.addEventListener('click',function(e){ if(pop.classList.contains('open')&&!pop.contains(e.target)&&e.target!==btn)pop.classList.remove('open'); });
  }

  function injectUI(){
    renderAccount();
    var bR=document.getElementById('btnReady'); if(bR)bR.onclick=openReadyMade;
    var bM=document.getElementById('btnMine'); if(bM)bM.onclick=openMyIndices;
    var bS=document.getElementById('btnSave'); if(bS)bS.onclick=async function(){ if(!requireLogin())return; await doSave(false); };
    // modal close handlers
    document.querySelectorAll('.cloud-modal').forEach(function(m){
      m.addEventListener('click',function(e){ if(e.target===m||e.target.hasAttribute('data-close'))m.classList.remove('open'); });
    });
    document.getElementById('rmSearch').addEventListener('input',renderReadyMade);
    document.getElementById('rmCat').addEventListener('change',renderReadyMade);
    initTopSearch(); initRange(); initSettings();
    // change detection for autosave + keep chips in sync with the hidden row store
    document.getElementById('idxName').addEventListener('input',scheduleAutosave);
    document.getElementById('wMcap').addEventListener('click',scheduleAutosave);
    document.getElementById('wEqual').addEventListener('click',scheduleAutosave);
    var sl=document.getElementById('stockList');
    new MutationObserver(function(){ renderChips(); scheduleAutosave(); }).observe(sl,{childList:true});
    sl.addEventListener('input',scheduleAutosave);
    renderChips();
  }

  // ── restore last index on load (most recently updated) ──
  async function restore(){
    if(!(session&&session.user))return;
    try{
      var res=await api('/api/index-builder/indices'); var p=await res.json();
      if(res.ok&&p.success&&p.data.length){ var ix=p.data[0]; currentId=ix.id; currentShareId=ix.shareId; applyState(ix); setStatus('Restored "'+ix.name+'"'); dirty=false; }
    }catch(e){}
  }

  // ── boot ──
  (async function(){
    try{ var r=await api('/api/auth/session'); session=await r.json(); }catch(e){ session=null; }
    if(session&&!session.user)session=null;
    injectUI();
    renderAccount();
    await restore();
  })();
})();
</script>
</body>
</html>
